# 1. Fetch the config
- name: insure folder in home all belongs to core
  become: yes
  file:
    path: "/home/core"
    owner: "core"
    group: "core"
    state: directory
    recursive: yes

# 1. Fetch the config to the Ansible controller (helper)
- name: 4.1 - Fetch admin.conf to controller temp
  become: yes
  fetch:
    src: /etc/kubernetes/admin.conf
    # We save it to a temp path on the helper where we have guaranteed access
    dest: "/tmp/admin.conf"
    flat: yes
  when: inventory_hostname == groups['control_nodes'][0]

# 2. Push the config to all nodes in the cluster
- name: 4.2 - Distribute kubeconfig to all nodes
  become: yes
  copy:
    src: "/tmp/admin.conf"
    dest: "/home/core/.kube/config"
    owner: core
    group: core
    mode: '0600'
  # We run this on everyone except the controller itself (if needed)
  # Or just 'all' if we want it everywhere.

- name: insure folder in home all belongs to core
  become: yes
  file:
    path: "/home/core"
    owner: "core"
    group: "core"
    state: directory
    recursive: yes

# 2. Fix permissions locally
- name: 4.2 - Fix local kubeconfig permissions
  delegate_to: localhost
  become: yes
  run_once: true
  file:
    path: "/home/core/.kube/config"
    owner: "core"
    mode: '0600'
    state: file

- name: 4.2b - Ensure KUBECONFIG is present on localhost
  become: yes
  fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ lookup('env', 'HOME') }}/.kube/config"
    flat: yes
  # delegate_to: "{{ groups['control_nodes'][0] }}"

- name: update local kubeconfig permissions
  delegate_to: localhost
  become: yes
  file:
    path: "/home/core/.kube/config"
    owner: "core"
    mode: '0600'
    state: file

- name: 4.4 - Apply Flannel Pod Network (Fixed Interface)
  shell: |
    # 1. Download the latest manifest
    curl -sLO https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
    
    # 2. Inject the --iface flag into the container arguments
    # This forces Flannel to use enp2s0 for the VXLAN tunnel
    sed -i '/- --kube-subnet-mgr/a \        - --iface=enp2s0' kube-flannel.yml
    
    # 3. Apply the modified manifest
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f kube-flannel.yml
  delegate_to: "{{ groups['control_nodes'][0] }}"
  run_once: true
  become: true
# . Automated Wait for 'Ready' Status
- name: 4.6 - Wait for all 5 nodes to transition to Ready
  shell: "kubectl get nodes | grep ' Ready ' | wc -l"
  delegate_to: localhost
  register: ready_count
  # We expect 5 (msrlv9mast01-03 + msrlv9wrk01-02)
  until: ready_count.stdout | trim | int == 5
  retries: 30
  delay: 10
  run_once: true
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"