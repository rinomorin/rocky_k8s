---
- name: Allow MetalLB Memberlist traffic
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 7946/tcp
    - 7946/udp

- name: 7.1 - Enable Strict ARP in Kube-Proxy (Required for MetalLB)
  shell: |
    kubectl get configmap kube-proxy -n kube-system -o yaml | \
    sed 's/strictARP: false/strictARP: true/' | \
    kubectl apply -f - -n kube-system
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: 7.2 - Install MetalLB Manifests
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  command: "kubectl apply -f {{ item }} --validate=false"
  loop:
    - https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
  delegate_to: localhost

- name: 7.2b - Give the API a moment to breathe
  pause:
    seconds: 10

- name: 7.3 - Wait for MetalLB Controller to exist and be Ready
  shell: "kubectl get pods -n metallb-system -l app=metallb,component=controller -o jsonpath='{.items[0].status.phase}'"
  register: mlb_check
  until: mlb_check.stdout == "Running"
  retries: 20
  delay: 10
  delegate_to: localhost
  failed_when: false # Prevents crashing if the pod isn't created in the first 1 second
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: 7.2c - Give the API a moment to breathe again
  pause:
    seconds: 20

- name: 7.4 - Configure MetalLB IP Pool and L2 Advertisement
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  shell: |
    cat <<EOF | kubectl apply --validate=false -f -
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: first-pool
      namespace: metallb-system
    spec:
      addresses:
      - 10.0.0.200-10.0.0.200
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: example-ad
      namespace: metallb-system
    spec:
      ipAddressPools:
      - first-pool
    EOF
  register: apply_result
  until: apply_result.rc == 0
  retries: 10
  delay: 15

- name: 7.4.1 - Login to FreeIPA Master Node
  delegate_to: "{{ ipa_master_fqdn }}"
  ansible.builtin.shell: echo "{{ ipa_admin_password }}" | kinit admin
  run_once: true
  changed_when: false

- name: 7.4.2 - Register HTTP Service Principal on FreeIPA Master
  delegate_to: "{{ ipa_master_fqdn }}"
  ansible.builtin.shell: "ipa service-add HTTP/nginx.api.{{ cloud_zone }} || true"
  run_once: true
  changed_when: false

- name: 7.4.2.1 cleanup old
  shell: 
    rm -f /tmp/tls.*

- name: 7.4.3 - Generate Private Key & CSR Locally and Push to FreeIPA
  delegate_to: localhost
  become: false
  vars: 
    ipa_ip: "{{ hostvars[ipa_master_fqdn.split('.')[0]]['ansible_host'] }}"
  shell: |
    # Generate local private key and Certificate Signing Request (CSR)
    openssl req -new -nodes -newkey rsa:4096 \
      -keyout /tmp/tls.key \
      -out /tmp/tls.csr \
      -subj "/CN=nginx.api.{{ cloud_zone }}/O={{ lookup('env','ACCOUNT') | default('Morinsoft') }}" \
      -addext "subjectAltName = DNS:nginx.api.{{ cloud_zone }}, DNS:*.api.{{ cloud_zone }}"

    chmod 644 /tmp/tls.csr
  run_once: true

- name: 7.4.3.2 - Push CSR to IPA Master
  # We use the copy module which is much more reliable than shell scp
  ansible.builtin.copy:
    src: /tmp/tls.csr
    dest: /tmp/tls.csr
    owner: root
    group: root
    mode: '0644'
  delegate_to: "{{ ipa_master_fqdn }}"
  run_once: true

- name: 7.4.4 - Execute FreeIPA CA Certificate Sign Request
  delegate_to: "{{ ipa_master_fqdn }}"
  become: yes
  ansible.builtin.shell: |
    # Request the FreeIPA CA engine to sign the CSR under the HTTP principal track
    if [[ -z /tmp/tls.crt ]]; then 
      echo "{{ ipa_admin_password }}" | kinit admin
      ipa cert-request /tmp/tls.csr \
        --principal=HTTP/nginx.api.{{ cloud_zone }} \
        --certificate-out=/tmp/tls.crt
    fi
  run_once: true
  register: cert_view

- debug:
    var: cert_view

- name: 7.4.5 - Pull Signed Certificate back to Local Control Host
  delegate_to: localhost
  become: false
  vars: 
    ipa_ip: "{{ hostvars[ipa_master_fqdn.split('.')[0]]['ansible_host'] }}"
  shell: |
    scp -o StrictHostKeyChecking=no {{ ipa_ip }}:/tmp/tls.crt /tmp/tls.crt
  run_once: true

- name: 7.4c - Upload FreeIPA Signed TLS Secret to Kubernetes Cluster
  delegate_to: localhost
  become: false
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    kubectl delete secret nginx-tls-secret --ignore-not-found=true
    kubectl create secret tls nginx-tls-secret --cert=/tmp/tls.crt --key=/tmp/tls.key
  run_once: true

- name: 7.5 - Expose Nginx Smoke Test via MetalLB and Ingress HTTPS
  become: false
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginxdemos/hello:plain-text
            ports:
            - containerPort: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: nginx-lb
    spec:
      selector:
        app: nginx
      ports:
        - protocol: TCP
          port: 80
          targetPort: 80
      type: LoadBalancer
      loadBalancerIP: {{ metallb_vip }}
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: nginx-smoke-test-ingress
      annotations:
        kubernetes.io/ingress.class: nginx
    spec:
      tls:
      - hosts:
        - nginx.api.cloud.home.morinsoft.ca
        secretName: nginx-tls-secret
      rules:
      - host: nginx.api.cloud.home.morinsoft.ca
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-lb
                port:
                  number: 80
    EOF
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
