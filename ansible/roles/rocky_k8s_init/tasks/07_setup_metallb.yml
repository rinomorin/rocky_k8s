---
- name: Allow MetalLB Memberlist traffic
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 7946/tcp
    - 7946/udp

- name: 7.1 - Enable Strict ARP in Kube-Proxy (Required for MetalLB)
  shell: |
    kubectl get configmap kube-proxy -n kube-system -o yaml | \
    sed 's/strictARP: false/strictARP: true/' | \
    kubectl apply -f - -n kube-system
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: 7.2 - Install MetalLB Manifests
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  command: "kubectl apply -f {{ item }} --validate=false"
  loop:
    - https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
  delegate_to: localhost

- name: 7.2b - Give the API a moment to breathe
  pause:
    seconds: 10

- name: 7.3 - Wait for MetalLB Controller to exist and be Ready
  shell: "kubectl get pods -n metallb-system -l app=metallb,component=controller -o jsonpath='{.items[0].status.phase}'"
  register: mlb_check
  until: mlb_check.stdout == "Running"
  retries: 20
  delay: 10
  delegate_to: localhost
  failed_when: false # Prevents crashing if the pod isn't created in the first 1 second
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: 7.2c - Give the API a moment to breathe again
  pause:
    seconds: 20

- name: 7.4 - Configure MetalLB IP Pool and L2 Advertisement
  delegate_to: localhost
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  shell: |
    cat <<EOF | kubectl apply --validate=false -f -
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: first-pool
      namespace: metallb-system
    spec:
      addresses:
      - 10.0.0.200-10.0.0.200
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: example-ad
      namespace: metallb-system
    spec:
      ipAddressPools:
      - first-pool
    EOF
  register: apply_result
  until: apply_result.rc == 0
  retries: 10
  delay: 15

- name: 7.4b - Generate FreeIPA Signed TLS Certificate for Smoke Test
  delegate_to: localhost
  become: yes
  shell: |
    # 1. Authenticate with FreeIPA Kerberos KDC
    echo "{{ ipa_admin_password }}" | kinit admin

    # 2. Ensure the host object exists in the FreeIPA identity database
    ipa host-add msrlv9mast01.cloud.home.morinsoft.ca --force || true

    # 3. Link the HTTP service routing principal to the correct subdomain host profile
    ipa service-add HTTP/nginx.api.cloud.home.morinsoft.ca --host=msrlv9mast01.cloud.home.morinsoft.ca || true

    # 4. Generate a local key and a matching standard CSR
    openssl req -new -nodes -newkey rsa:2048 \
      -keyout /tmp/tls.key \
      -out /tmp/tls.csr \
      -subj "/CN=nginx.api.cloud.home.morinsoft.ca/O=Morinsoft" \
      -addext "subjectAltName = DNS:nginx.api.cloud.home.morinsoft.ca, DNS:*.api.cloud.home.morinsoft.ca"

    # 5. Request the FreeIPA CA to sign the CSR using the linked identity track
    ipa cert-request /tmp/tls.csr \
      --principal=HTTP/nginx.api.cloud.home.morinsoft.ca \
      --certificate-out=/tmp/tls.crt

    # set permissions
    chmod 644 /tmp/tls.crt /tmp/tls.key
  # args:
  #   executable: /bin/bash


- name: 7.4c - Upload FreeIPA Signed TLS Secret to Kubernetes
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    kubectl delete secret nginx-tls-secret --ignore-not-found=true
    kubectl create secret tls nginx-tls-secret --cert=/tmp/tls.crt --key=/tmp/tls.key

- name: 7.5 - Expose Nginx Smoke Test via MetalLB and Ingress HTTPS
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginxdemos/hello:plain-text
            ports:
            - containerPort: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: nginx-lb
    spec:
      selector:
        app: nginx
      ports:
        - protocol: TCP
          port: 80
          targetPort: 80
      type: LoadBalancer
      loadBalancerIP: {{ metallb_vip }}
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: nginx-smoke-test-ingress
      annotations:
        kubernetes.io/ingress.class: nginx
    spec:
      tls:
      - hosts:
        - nginx.api.cloud.home.morinsoft.ca
        secretName: nginx-tls-secret
      rules:
      - host: nginx.api.cloud.home.morinsoft.ca
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-lb
                port:
                  number: 80
    EOF
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
