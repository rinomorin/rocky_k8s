- name: 7.4c - Upload FreeIPA Signed TLS Secret to Kubernetes Cluster
  delegate_to: localhost
  become: false
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    kubectl delete secret nginx-tls-secret --ignore-not-found=true
    kubectl create secret tls nginx-tls-secret --cert=/tmp/tls.crt --key=/tmp/tls.key
  run_once: true

# ---------- Nginx smoke test exposed via MetalLB + Ingress on api.<cloud_zone> ----------

- name: 7.5 - Expose Nginx Smoke Test via MetalLB and Ingress HTTPS
  delegate_to: localhost
  become: false
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginxdemos/hello:plain-text
            ports:
            - containerPort: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: nginx-lb
    spec:
      selector:
        app: nginx
      ports:
        - name: http
          protocol: TCP
          port: 80
          targetPort: 80
      type: LoadBalancer
      loadBalancerIP: {{ metallb_vip }}
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: nginx-smoke-test-ingress
      namespace: default
      annotations:
        # Legacy support + new class field for maximum compatibility
        kubernetes.io/ingress.class: "nginx"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
    spec:
      ingressClassName: nginx
      tls:
      - hosts:
        - api.{{ cloud_zone }}
        - nginx.api.{{ cloud_zone }}
        secretName: nginx-tls-secret
      rules:
      - host: api.{{ cloud_zone }}
        http:
          paths: &nginx_paths
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-lb
                port:
                  number: 80
      - host: nginx.api.{{ cloud_zone }}
        http:
          paths: *nginx_paths
    EOF