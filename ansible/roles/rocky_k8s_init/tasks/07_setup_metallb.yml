---
- name: Allow MetalLB Memberlist traffic
  firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - 7946/tcp
    - 7946/udp

- name: 7.1 - Enable Strict ARP in Kube-Proxy (Required for MetalLB)
  shell: |
    kubectl get configmap kube-proxy -n kube-system -o yaml | \
    sed 's/strictARP: false/strictARP: true/' | \
    kubectl apply -f - -n kube-system
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: 7.2 - Install MetalLB Manifests
  command: "kubectl apply -f {{ item }} --validate=false"
  loop:
    - https://raw.githubusercontent.com/metallb/metallb/v0.14.3/config/manifests/metallb-native.yaml
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"

- name: whoami on localhost
  delegate_to: localhost
  shell: |
    whoami
  register: whoami_check
- debug:
    msg: "{{ whoami_check }}"

- name: 7.2b - Give the API a moment to breathe
  pause:
    seconds: 10

- name: 7.3 - Wait for MetalLB Controller to exist and be Ready
  shell: "kubectl get pods -n metallb-system -l app=metallb,component=controller -o jsonpath='{.items[0].status.phase}'"
  register: mlb_check
  until: mlb_check.stdout == "Running"
  retries: 20
  delay: 10
  delegate_to: localhost
  failed_when: false
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"


- name: 7.3 - Wait for MetalLB CRDs to be established
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    kubectl wait --for condition=established --timeout=60s crd/ipaddresspools.metallb.io || \
    kubectl wait --for condition=established --timeout=60s crd/ipaddresspools.metallb.universe.tf
  register: crd_check
  ignore_errors: yes

- name: 7.2c - Give the API a moment to breathe again
  pause:
    seconds: 20

- name: 7.4 - Configure MetalLB Service + Maintenance Pools
  delegate_to: localhost
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: service-pool
      namespace: metallb-system
    spec:
      addresses:
      - 10.0.0.200-10.0.0.210
    ---
    apiVersion: metallb.io/v1beta1
    kind: IPAddressPool
    metadata:
      name: maintenance-pool
      namespace: metallb-system
    spec:
      addresses:
      - 10.0.0.221-10.0.0.231
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: service-ad
      namespace: metallb-system
    spec:
      ipAddressPools:
      - service-pool
    ---
    apiVersion: metallb.io/v1beta1
    kind: L2Advertisement
    metadata:
      name: maintenance-ad
      namespace: metallb-system
    spec:
      ipAddressPools:
      - maintenance-pool
    EOF
  register: apply_result
  until: apply_result.rc == 0
  retries: 10
  delay: 15

# ---------- FreeIPA + TLS for single hostname: api.<cloud_zone> ----------
- name: who running 
  shell: |
    whoami
  register: whoami_check
- debug:
    msg: "{{ whoami_check }}"

- name: 7.4.1 - Login to FreeIPA Master Node
  delegate_to: localhost
  ansible.builtin.shell: echo "{{ ipa_admin_password }}" | kinit admin
  run_once: true
  changed_when: false

- name: 7.4.2 - Ensure HTTP Service Principal exists on FreeIPA Master
  delegate_to: localhost
  ansible.builtin.shell: "ipa service-add HTTP/api.{{ cloud_zone }} || true"
  run_once: true
  changed_when: false

- name: 7.4.2.1 - Cleanup old TLS artifacts on localhost
  delegate_to: localhost
  shell: rm -f /tmp/tls.key /tmp/tls.crt /tmp/tls.csr
  run_once: true

- name: 7.4.3 - Generate Private Key & CSR Locally (single hostname)
  delegate_to: localhost
  become: false
  shell: |
    rm -f /tmp/tls.key /tmp/tls.crt /tmp/tls.csr
    
    openssl req -new -nodes -newkey rsa:4096 \
      -keyout /tmp/tls.key \
      -out /tmp/tls.csr \
      -subj "/CN=api.{{ cloud_zone }}/O={{ lookup('env','ACCOUNT') | default('Morinsoft') }}" \
      -addext "subjectAltName = DNS:api.{{ cloud_zone }}"
    chmod 644 /tmp/tls.csr
  run_once: true

- name: 7.4.3.2 - Push CSR to IPA Master
  ansible.builtin.copy:
    src: /tmp/tls.csr
    dest: /tmp/tls.csr
    owner: root
    group: root
    mode: '0644'
    force: true
  delegate_to: "{{ ipa_master_fqdn }}"
  run_once: true

- name: Check if certificate already exists on IPA master
  delegate_to: localhost
  stat:
    path: /tmp/tls.crt
  register: tls_cert
  run_once: true

- name: Ensure host exists for api.<cloud_zone>
  delegate_to: localhost
  command: ipa host-add api.{{ cloud_zone }}
  ignore_errors: yes
  register: host_rc
  failed_when:
    - "'already exists' not in host_rc.stderr"  
  when: not tls_cert.stat.exists
  run_once: true

- name: Ensure service principal exists for api.<cloud_zone>
  delegate_to: localhost
  command: ipa service-add HTTP/api.{{ cloud_zone }}
  ignore_errors: yes
  register: host_rc2
  failed_when:
    - "'already exists' not in host_rc2.stderr"  
  when: not tls_cert.stat.exists
  run_once: true

- name: Submit CSR to FreeIPA
  delegate_to: localhost
  command: >
    ipa cert-request /tmp/tls.csr --principal=HTTP/api.{{ cloud_zone }}
  register: cert_request
  when: not tls_cert.stat.exists
  run_once: true

- name: Debug cert_request stdout (optional)
  debug:
    var: cert_request.stdout
  when: not tls_cert.stat.exists
  run_once: true

- name: get Serial number
  ansible.builtin.shell: |
    echo "{{ cert_request.stdout }}" | grep -i "Serial number:" | awk -F': ' '{print $2}'
  register: serno
  changed_when: false

- name: Show Serial Number
  ansible.builtin.debug:
    msg: "The Serial Number is: {{ serno.stdout }}"

- name: Extract Request ID or Serial Number
  set_fact:
    cert_request_id: "{{ serno.stdout }}"
  when: not tls_cert.stat.exists
  run_once: true

