---
- name: Configure Firewalld for Kubernetes Networking
  ansible.posix.firewalld:
    zone: trusted
    interface: "{{ item }}"
    state: enabled
    permanent: yes
    immediate: yes
  loop:
    - enp2s0
    - flannel.1
    - cni0

- name: Allow intra-zone forwarding in trusted zone (Permanent)
  ansible.posix.firewalld:
    zone: trusted
    target: ACCEPT
    permanent: yes
    state: enabled

- name: Reload firewalld to apply zone target changes
  service:
    name: firewalld
    state: reloaded

- name: Enable Masquerading for Pod Network
  ansible.posix.firewalld:
    masquerade: yes
    state: enabled
    permanent: yes
    immediate: yes

- name: 4.b - Set Sysctl Parameters for K8s (Shell Version)
  shell: |
    # Ensure the directory exists
    mkdir -p /etc/sysctl.d/
    
    # Create or overwrite the k8s.conf file
    cat <<EOF > /etc/sysctl.d/k8s.conf
    net.bridge.bridge-nf-call-iptables = 1
    net.bridge.bridge-nf-call-ip6tables = 1
    net.ipv4.conf.all.rp_filter = 2
    net.ipv4.conf.default.rp_filter = 2
    net.ipv4.ip_forward = 1
    EOF
    
    # Load the parameters into the living kernel
    sysctl --system
  become: yes
