---
# 1. Run verification on ALL nodes first
- import_tasks: 01_k8s_verify.yml

# 2. Run Initialize ONLY on the first master
- import_tasks: 02_k8s_initialize.yml

# 3. Run Join on everything else
- import_tasks: 03_k8s_join.yml

# 4. run post init
- import_tasks: 04b_fix_firewall.yml
- import_tasks: 04_post_init.yml

