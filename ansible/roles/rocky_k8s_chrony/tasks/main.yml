---
# TASK 1: Only run on the Primary IPA Node
- debug: msg="Processing {{ inventory_hostname }} using "{{ ansible_user }}"

- name: Configure Primary IPA Master
  ansible.builtin.template:
    src: chrony_ipa.conf.j2
    dest: /etc/chrony.conf
  when: inventory_hostname == groups['ipa'][0]
  notify: Restart chrony

