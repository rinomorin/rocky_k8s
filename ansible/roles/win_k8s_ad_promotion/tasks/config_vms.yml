---
- name: Windows Immutable-Style Initialization
  block:
    # --- STEP 1: LICENSING ---
    # Note: If your Golden Image is already licensed/converted, this can be skipped.
    # - name: Convert Eval to Licensed Standard Core
    #   ansible.windows.win_shell: |
    #     dism /online /set-edition:ServerStandardCore /productkey:{{ win_oem_key }} /accepteula /norestart
    #   register: dism_result
    #   failed_when: 
    #     - dism_result.rc != 0 
    #     - dism_result.rc != 3010
    #   changed_when: dism_result.rc == 3010

    - name: Convert Eval to Licensed Datacenter Core
      win_shell: |
        $target = "ServerDatacenterCore"
        $kmsKey = "WX4NM-KYWYW-QJJR4-XV3QB-6VM33"
        
        $current = (Get-ComputerInfo).WindowsEditionId
        if ($current -eq $target) {
            Write-Host "STATUS_ALREADY_CONVERTED"
            exit 0
        }

        dism /online /set-edition:$target /productkey:$kmsKey /accepteula /norestart
      register: dism_output
      changed_when: "'command completed successfully' in dism_output.stdout | lower"
      failed_when: 
        - dism_output.rc != 0
        - "'STATUS_ALREADY_CONVERTED' not in dism_output.stdout"

  
    - debug:
       var: dism_output
  
    - name: Reboot to finalize licensing
      ansible.windows.win_reboot:
      when: dism_result.changed

    # --- STEP 2: NETWORKING & AD ---
    - name: Create Forest (Primary DC)
      microsoft.ad.domain:
        dns_domain_name: "{{ domain_netbios }}"
        safe_mode_password: "{{ ad_safe_mode_password }}"
        install_dns: yes
        database_path: C:\Windows\NTDS
      register: forest_creation
      when: inventory_hostname == groups['win_worker_nodes'][0]

    # --- STEP 3: ACCOUNT MIGRATION FIX ---
    # After promotion, the local 'core' user becomes 'ACME\core'
    - name: Update Ansible User to Domain Context
      set_fact:
        ansible_user: "core@{{ domain_netbios }}"
      when: forest_creation.changed

    - name: Join Replica DC
      microsoft.ad.membership:
        dns_domain_name: "{{ domain_netbios }}"
        # Use our 'core' user which is now a Domain Admin (once added to the group)
        domain_admin_user: "core@{{ domain_netbios }}"
        domain_admin_password: "{{ ansible_password }}"
        state: domain
      register: replica_join
      when: inventory_hostname == groups['win_worker_nodes'][1]

  rescue:
    - name: Alert on Failure
      debug:
        msg: "Deployment failed. Check if 'ansible_shell_type: powershell' is set."

  always:
    - name: Final Reboot
      ansible.windows.win_reboot:
      when: 
        - (forest_creation.changed | default(false)) or (replica_join.changed | default(false))
