# ------------------------------------------------------------
# Reconnect logic after reboot
# Prefer br-cluster (provision_ip), fallback to br-nat via KVM
# ------------------------------------------------------------

# 1. Try br-cluster (provision_ip) first
- name: Try SSH via provision_ip
  wait_for:
    host: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
    port: 22
    timeout: 15
  delegate_to: localhost
  register: provision_ssh
  failed_when: false
  changed_when: false

- name: Use provision_ip if reachable
  set_fact:
    ansible_host: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
  when: provision_ssh.elapsed is defined and provision_ssh.elapsed < 15

- name: Reset SSH connection after switching to provision_ip
  meta: reset_connection
  when: provision_ssh.elapsed is defined and provision_ssh.elapsed < 15

# 2. Fallback: rediscover br-nat IP from KVM
- name: Rediscover br-nat IP from KVM (fallback)
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] | default('core') }}"
  raw: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip_fallback
  when: provision_ssh.elapsed is not defined or provision_ssh.elapsed >= 15

- name: Fail if fallback br-nat IP not found
  assert:
    that:
      - br_nat_ip_fallback.stdout | length > 0
  when: provision_ssh.elapsed is not defined or provision_ssh.elapsed >= 15

- name: Use br-nat fallback IP
  set_fact:
    ansible_host: "{{ br_nat_ip_fallback.stdout }}"
  when: provision_ssh.elapsed is not defined or provision_ssh.elapsed >= 15

- name: Reset SSH connection after switching to br-nat
  meta: reset_connection
  when: provision_ssh.elapsed is not defined or provision_ssh.elapsed >= 15

# 3. Final SSH verification
- name: Wait for SSH on selected interface
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 120
  delegate_to: localhost