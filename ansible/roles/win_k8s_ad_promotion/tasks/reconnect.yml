# roles/rocky_k8s/tasks/reconnect.yml

# ------------------------------------------------------------
# After reboot: try provider_ip first
# ------------------------------------------------------------

- name: Try SSH via provider_ip
  wait_for:
    host: "{{ provider_ip }}"
    port: 22
    timeout: 15
  register: provider_ssh
  failed_when: false
  changed_when: false

- name: Use provider_ip for SSH
  set_fact:
    ansible_host: "{{ provider_ip }}"
  when: provider_ssh.elapsed is defined and provider_ssh.elapsed < 15

# ------------------------------------------------------------
# Fallback to br-nat if provider_ip fails
# ------------------------------------------------------------

- name: Rediscover br-nat IP from KVM (fallback)
  delegate_to: "{{ kvm }}"
  shell: |
    virsh domifaddr {{ inventory_hostname }} \
      --source agent,lease | awk '/ipv4/ && /br-nat/ {print $4}' | cut -d/ -f1
  register: br_nat_ip_fallback
  when: provider_ssh.elapsed is not defined or provider_ssh.elapsed >= 15

- name: Use br-nat IP fallback
  set_fact:
    ansible_host: "{{ br_nat_ip_fallback.stdout }}"
  when: provider_ssh.elapsed is not defined or provider_ssh.elapsed >= 15

# ------------------------------------------------------------
# Wait for SSH on chosen interface
# ------------------------------------------------------------

- name: Wait for SSH on selected interface
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 300
``