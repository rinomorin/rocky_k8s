---
# --- INFRASTRUCTURE TASKS (Delegated to KVM via SSH) ---
- name: Create QCOW2 overlay for Windows Worker
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  command: >
    qemu-img create -f qcow2 
    -F qcow2
    -b /var/lib/libvirt/images/gi-win22-20260503.qcow2 
    /var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2
  # This flag tells Ansible to skip the command if the file already exists
  args:
    creates: "/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2"

- name: Check if VM is already defined
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: "virsh list --all | grep -w {{ inventory_hostname.split('.')[0] }}"
  register: vm_exists
  failed_when: false
  changed_when: false

- name: Define and Launch Windows VM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    virt-install \
      --name {{ inventory_hostname.split('.')[0] }} \
      --memory 4096 \
      --vcpus 2 \
      --disk path=/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2,format=qcow2 \
      --import \
      --os-variant win2k22 \
      --network network=br-nat \
      --network network=br-cluster \
      --noautoconsole \
      --wait 0
  # Only run this if the 'Check' task failed to find the VM name
  when: vm_exists.rc != 0

- name: Discover Maintenance IP
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 5; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: maintenance_ip_raw
  retries: 20
  delay: 10

# --- GUEST TRANSITION (Now using SSH) ---
- name: Set SSH facts for Windows
  ansible.builtin.set_fact:
    ansible_host: "{{ maintenance_ip_raw.stdout | trim }}"
    ansible_connection: ssh
    ansible_user: core
    ansible_password: "{{ lookup('env', 'secops_pwd') }}"
    ansible_shell_type: powershell
    # Required for Rocky Linux / OpenSSL 3 compatibility
    ansible_ssh_common_args: '-o "SetEnv OPENSSL_CONF=/dev/null"' 

- name: Wait for SSH (Human Intervention Required)
  ansible.builtin.wait_for:
    host: "{{ maintenance_ip_raw.stdout | trim }}"
    port: 22
    state: started
    delay: 30
    # Increased timeout to 30 minutes to allow time for the human to interact
    timeout: 1800 
  delegate_to: localhost

- name: Gather facts via SSH
  ansible.builtin.setup:
