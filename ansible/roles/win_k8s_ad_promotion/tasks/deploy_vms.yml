---
# --- INFRASTRUCTURE TASKS (Delegated to KVM via SSH) ---
---
# We'll use the 'kvm' group directly to avoid context errors
- name: Ensure floppy tools are on KVM host
  ansible.builtin.package:
    name:
      - dosfstools
      - mtools
    state: present
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] | default('secops') }}"

- name: Create Floppy and Launch Windows VM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    # 1. Define workspace
    VM_NAME="{{ inventory_hostname.split('.')[0] }}"
    IMG_DIR="/var/lib/libvirt/images"
    FLOPPY_IMG="${IMG_DIR}/${VM_NAME}-unattend.vfd"
    XML_FILE="autounattend.xml"

    # 2. Create the XML content (Minimal to bypass OOBE and Enable WinRM)
    cat <<EOF > /tmp/${VM_NAME}-unattend.xml
    <?xml version="1.0" encoding="utf-8"?>
    <unattend xmlns="urn:schemas-microsoft-com:unattend">
        <settings pass="specialize">
            <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                <ComputerName>${VM_NAME}</ComputerName>
            </component>
        </settings>
        <settings pass="oobeSystem">
            <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                <OOBE>
                    <HideEULAPage>true</HideEULAPage>
                    <HideLocalAdministrationPage>true</HideLocalAdministrationPage>
                    <HideOEMRegistrationScreen>true</HideOEMRegistrationScreen>
                    <HideOnlineAccountScreens>true</HideOnlineAccountScreens>
                    <HideWirelessSetupInOOBE>true</HideWirelessSetupInOOBE>
                    <NetworkLocation>Work</NetworkLocation>
                    <ProtectYourPC>1</ProtectYourPC>
                </OOBE>
                <UserAccounts>
                    <AdministratorPassword>
                        <Value>{{ ad_admin_password }}</Value>
                        <PlainText>true</PlainText>
                    </AdministratorPassword>
                </UserAccounts>
                <FirstLogonCommands>
                    <SynchronousCommand wcm:action="add">
                        <CommandLine>powershell -Command "Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Force"</CommandLine>
                        <Description>Set Execution Policy</Description>
                        <Order>1</Order>
                    </SynchronousCommand>
                    <SynchronousCommand wcm:action="add">
                        <CommandLine>powershell -Command "winrm quickconfig -force; winrm set winrm/config/service/auth '@{Basic=\"true\"}'; winrm set winrm/config/service '@{AllowUnencrypted=\"true\"}'"</CommandLine>
                        <Description>Enable WinRM</Description>
                        <Order>2</Order>
                    </SynchronousCommand>
                </FirstLogonCommands>
            </component>
        </settings>
    </unattend>
    EOF

    # 3. Create a 1.44MB Floppy Image
    dd if=/dev/zero of=${FLOPPY_IMG} bs=1k count=1440
    mkfs.msdos ${FLOPPY_IMG}

    # 4. Copy the XML into the Floppy Image using mcopy (from 'mtools')
    # If mtools isn't installed, we'd have to mount the loop device, which is messier.
    mcopy -i ${FLOPPY_IMG} /tmp/${VM_NAME}-unattend.xml ::/autounattend.xml
  register: virt_out

# ... [Previous tasks: overlay, virt-install, discovery, and set_fact] ...

- name: Install pywinrm on control node via shell
  ansible.builtin.shell: "{{ ansible_playbook_python }} -m pip install pywinrm"
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Create QCOW2 overlay for Windows Worker
  ansible.builtin.command: >
    qemu-img create -f qcow2 
    -F vpc 
    -b /var/lib/libvirt/images/ws2022-gold.vhd 
    /var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"

- name: Define and Launch Windows VM via virt-install
  ansible.builtin.shell: |
    virt-install \
      --name {{ inventory_hostname.split('.')[0] }} \
      --memory 4096 \
      --vcpus 2 \
      --disk path=/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2,format=qcow2 \
      --disk path=${FLOPPY_IMG},device=floppy \
      --import \
      --os-variant win2k22 \
      --network network=br-nat \
      --network network=br-cluster \
      --noautoconsole \
      --wait 0
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  register: virt_out
  failed_when: 
    - virt_out.rc != 0
    - "'already exists' not in virt_out.stderr"

- name: Verify VM is running on KVM
  ansible.builtin.shell: virsh domstate {{ inventory_hostname.split('.')[0] }}
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  register: vm_state
  until: "'running' in vm_state.stdout"
  retries: 10
  delay: 5

- name: 1.1 - Discover Maintenance IP from br-nat
  ansible.builtin.shell: |
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 2; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  register: maintenance_ip_raw

- debug:
    msg: "Discovered Maintenance IP for {{ inventory_hostname }}: {{ maintenance_ip_raw.stdout }}"
# --- GUEST TRANSITION ---

- name: Set Maintenance IP fact
  ansible.builtin.set_fact:
    ansible_host: "{{ maintenance_ip_raw.stdout | trim }}"
    ansible_connection: winrm
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: ntlm

- name: Wait for WinRM port (5985) to become available
  ansible.builtin.wait_for:
    host: "{{ maintenance_ip_raw.stdout | trim }}"
    port: 5985
    state: started
    delay: 10
    timeout: 300
  delegate_to: localhost

- name: Gather facts now that we have connectivity
  ansible.builtin.setup: