---
# We use the first host in the 'kvm' group as our orchestration target
- name: Create QCOW2 overlay for Windows Worker
  ansible.builtin.command: >
    qemu-img create -f qcow2 
    -F vpc 
    -b /var/lib/libvirt/images/ws2022-gold.vhd 
    /var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    # Explicitly pull the user for the KVM host to avoid 'core' vs 'secops' mixups
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  # args:
  #   creates: "/var/lib/libvirt/images/{{ inventory_hostname }}.qcow2"

- name: Define and Launch Windows VM via virt-install
  ansible.builtin.shell: |
    virt-install \
      --name {{ inventory_hostname.split('.')[0] }} \
      --memory 4096 \
      --vcpus 2 \
      --disk path=/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2,format=qcow2 \
      --import \
      --os-variant win2k22 \
      --network network=br-nat \
      --network network=br-cluster \
      --noautoconsole \
      --wait 0
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  register: virt_out
  failed_when: 
    - virt_out.rc != 0
    - "'already exists' not in virt_out.stderr"

- name: Verify VM is running on KVM
  ansible.builtin.shell: virsh domstate {{ inventory_hostname.split('.')[0] }}
  delegate_to: "{{ kvm_ip }}"
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  register: vm_state
  become: yes
  until: "'running' in vm_state.stdout"
  retries: 10
  delay: 5

- name: 1.1 - Discover Maintenance IP from br-nat
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  ansible.builtin.shell: |
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 2; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  delegate_to: "{{ kvm_ip }}"
  register: maintenance_ip_raw
  become: yes
  retries: 10
  delay: 5

- name: Set Maintenance IP fact
  set_fact:
    maintenance_ip: "{{ maintenance_ip_raw.stdout }}"

- name: Gather facts now that we have connectivity
  ansible.builtin.setup: