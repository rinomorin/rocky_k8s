---
# --- INFRASTRUCTURE TASKS (Delegated to KVM via SSH) ---
- name: Ensure ISO tools are on KVM host
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    # ansible_connection: ssh
    ansible_user: "{{ hostvars[kvm]['ansible_user'] }}"
  yum:
    name: [mtools, dosfstools, genisoimage]
    state: present

- name: Create Unattend ISO
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[kvm]['ansible_user'] }}"
    # Extract the short hostname outside the shell block to avoid quote nesting errors
    short_name: "{{ inventory_hostname.split('.')[0] }}"
  shell: |
    IMG_DIR="/var/lib/libvirt/images"
    ISO_IMG="${IMG_DIR}/{{ short_name }}-unattend.iso"
    CONFIG_DIR="/tmp/{{ short_name }}-config"

    mkdir -p "${CONFIG_DIR}"
    
    cat <<EOF > "${CONFIG_DIR}/autounattend.xml"
    <?xml version="1.0" encoding="utf-8"?>
    <unattend xmlns="urn:schemas-microsoft-com:unattend">
        <settings pass="specialize">
            <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                <ComputerName>{{ short_name }}</ComputerName>
            </component>
        </settings>
        <settings pass="oobeSystem">
            <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                <OOBE>
                    <HideEULAPage>true</HideEULAPage>
                    <NetworkLocation>Work</NetworkLocation>
                    <ProtectYourPC>1</ProtectYourPC>
                </OOBE>
            </component>
        </settings>
    </unattend>
    EOF

    genisoimage -output "${ISO_IMG}" -volid "OEMUP" -joliet -rock "${CONFIG_DIR}"
    chmod 644 "${ISO_IMG}"
    chown qemu:qemu "${ISO_IMG}"
    rm -rf "${CONFIG_DIR}"

- name: Create QCOW2 overlay for Windows Worker
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
  command: >
    qemu-img create -f qcow2 
    -F qcow2
    -b /var/lib/libvirt/images/ws2022-gold.qcow2 
    /var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2

- name: Define and Launch Windows VM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[kvm]['ansible_user'] }}" 
  shell: |
    virt-install \
      --name {{ inventory_hostname.split('.')[0] }} \
      --memory 4096 \
      --vcpus 2 \
      --disk path=/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}.qcow2,format=qcow2 \
      --disk path=/var/lib/libvirt/images/{{ inventory_hostname.split('.')[0] }}-unattend.iso,device=cdrom \
      --import \
      --os-variant win2k22 \
      --network network=br-nat \
      --network network=br-cluster \
      --noautoconsole \
      --wait 0

- name: Discover Maintenance IP
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_connection: ssh
    ansible_user: "{{ hostvars[kvm]['ansible_user'] }}"
  shell: |
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 5; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: maintenance_ip_raw
  retries: 20
  delay: 10

# --- GUEST TRANSITION (Now using SSH) ---
- name: Set SSH facts for Windows
  ansible.builtin.set_fact:
    ansible_host: "{{ maintenance_ip_raw.stdout | trim }}"
    ansible_connection: ssh
    ansible_user: core
    ansible_password: "{{ lookup('env', 'secops_pwd') }}"
    ansible_shell_type: powershell
    # Bypass OpenSSL 3 legacy restrictions on Rocky Linux
    ansible_ssh_common_args: '-o "SetEnv OPENSSL_CONF=/dev/null"' 
 

- name: Wait for SSH port (22) to become available
  ansible.builtin.wait_for:
    host: "{{ maintenance_ip_raw.stdout | trim }}"
    port: 22
    state: started
    delay: 30
    timeout: 600
  delegate_to: localhost

- name: Gather facts via SSH
  ansible.builtin.setup:
