---
# docker_join.yml - Kubernetes Cluster Integration (Docker on Windows)

- name: 2.0 - Ensure Docker Daemon is active
  ansible.windows.win_service:
    name: docker
    state: started
    start_mode: auto

- name: 1.11.2a - Force Purge Stale cri-dockerd Service Registration
  ansible.windows.win_shell: |
    $serviceName = "cri-dockerd"
    if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
        Stop-Service $serviceName -Force -ErrorAction SilentlyContinue
        # Use a secondary safety timeout delay to ensure the handle drops
        Start-Sleep -Seconds 2
    }
    # Force delete the service path keys from the registry database natively
    if (Test-Path "HKLM:\SYSTEM\CurrentControlSet\Services\$serviceName") {
        Remove-Item -Path "HKLM:\SYSTEM\CurrentControlSet\Services\$serviceName" -Recurse -Force
    }
  failed_when: false

- name: 1.11.2b - Freshly Register cri-dockerd via Native PowerShell Engine
  ansible.windows.win_shell: |
    $serviceName = "cri-dockerd"
    $exePath = '"C:\Program Files\cri-dockerd\cri-dockerd.exe"'

    # Register the service cleanly using native parameters
    New-Service -Name $serviceName `
                -BinaryPathName $exePath `
                -DisplayName "CRI-Docker Service" `
                -Description "CRI adapter wrapper tool for Kubernetes Docker interactions" `
                -StartupType Automatic | Out-Null

    # Ensure the service dependencies point cleanly to the active Docker daemon
    Set-Service -Name $serviceName -Dependency docker
  register: ps_service_creation

- name: 1.11.2c - Ensure cri-dockerd Service is Started Natively
  ansible.windows.win_service:
    name: cri-dockerd
    state: started
    start_mode: auto

- name: 2.1 - Register and Ensure CRI-Docker Adapter Service is active
  ansible.windows.win_service:
    name: cri-dockerd
    path: '"C:\Program Files\cri-dockerd\cri-dockerd.exe" --container-runtime-endpoint npipe:////./pipe/cri-dockerd'
    display_name: "CRI-Docker Service"
    description: "CRI adapter wrapper tool for Kubernetes Docker interactions"
    start_mode: auto
    state: started
    dependencies:
      - docker

- name: 2.2 - Generate join command on Linux Master
  ansible.builtin.shell: kubeadm token create --print-join-command
  delegate_to: "{{ hostvars[groups['control_nodes'][0]]['provision_ip'] }}"
  register: k8s_join_command_raw

- name: 2.3 - Pre-join Safe Cleanup
  ansible.windows.win_shell: |
    $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine")
    kubeadm reset --force
  ignore_errors: yes

- name: 2.4 - Join Windows Node to Cluster via Docker CRI
  ansible.windows.win_shell: |
    $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine")
    {{ k8s_join_command_raw.stdout }} --cri-socket=npipe:////./pipe/cri-dockerd --v=5
  register: join_result

- name: 2.5 - Verify Node Status on Master
  ansible.builtin.shell: kubectl get nodes
  delegate_to: "{{ hostvars[groups['control_nodes'][0]]['provision_ip'] }}"
  register: cluster_status
  until: "inventory_hostname.lower() in cluster_status.stdout.lower() and 'Ready' in cluster_status.stdout"
  retries: 15
  delay: 15