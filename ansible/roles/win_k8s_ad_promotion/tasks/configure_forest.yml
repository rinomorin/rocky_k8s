- name: Ensure AD services are running and verify
  delegate_to: br_nat_ip.stdout
  ansible.windows.win_shell: |
    $services = "ntds", "adws", "kdc"
    foreach ($s in $services) {
        Set-Service $s -StartupType Automatic
        Start-Service $s -ErrorAction SilentlyContinue
    }
    # Final check: Output only the services that are NOT running
    Get-Service $services | Where-Object { $_.Status -ne "Running" }
  register: service_check
  failed_when: service_check.stdout != ""
  become: yes
  become_method: runas

