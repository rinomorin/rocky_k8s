- name: Verify AD Database Existence
  raw: |
    powershell.exe -Command "Test-Path C:\Windows\NTDS\ntds.dit"
  register: db_check
  failed_when: "'False' in db_check.stdout"

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 900
    state: started
  delegate_to: localhost


- name: Ensure AD services are running (Raw Mode)
  raw: powershell.exe -Command "Set-Service ntds, adws, kdc -StartupType Automatic; Start-Service ntds, adws, kdc"
  become: yes
  become_method: runas

- name: Mark forest created (Raw Mode)
  raw: powershell.exe -Command "New-Item -Path '{{ windows_state_dir }}\\forest.done' -ItemType File -Force"
  become: yes
  become_method: runas
  when:
    - inventory_hostname == groups['win_worker_nodes'][0]
    - not forest_done.stat.exists

- name: Verify Forest Health (Service & Role Based)
  win_shell: !unsafe |
    $ErrorActionPreference = 'Stop'
    # 1. Check if the machine is a Domain Controller (Role 4 or 5)
    $Role = (Get-CimInstance Win32_ComputerSystem).DomainRole
    if ($Role -lt 4) { 
        Write-Error "Machine is not a Domain Controller (Role: $Role)"
        exit 1
    }

    # 2. Check critical AD services
    $Services = Get-Service ntds, adws, kdc, netlogon -ErrorAction SilentlyContinue
    foreach ($s in $Services) {
        if ($s.Status -ne 'Running') { 
            Write-Error "$($s.Name) is not running"
            exit 1
        }
    }
    
    # 3. If we made it here, recreate the state file if missing
    # Note: Using the hardcoded path or pass via env to avoid Jinja issues in !unsafe block
    $StateFile = "C:\k8s\forest.done" 
    if (!(Test-Path $StateFile)) {
        New-Item -Path $StateFile -ItemType File -Force
    }
    exit 0
  register: ad_health_check
  failed_when: false
  become: yes
  become_method: runas

- name: Set DNS Forwarders using PowerShell
  ansible.windows.win_shell: |
    $targets = @("10.0.0.20", "8.8.8.8", "1.1.1.1")
    $current = (Get-DnsServerForwarder).IPAddress
    
    # Check if our targets are already set to avoid unnecessary changes
    if (Compare-Object $current $targets) {
        Set-DnsServerForwarder -IPAddress $targets -PassThru
    }
  register: dns_result
  changed_when: dns_result.stdout != ""