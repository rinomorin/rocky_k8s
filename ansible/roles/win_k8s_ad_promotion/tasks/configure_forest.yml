# roles/rocky_k8s/tasks/configure_forest.yml
- name: Ensure state directory exists
  ansible.windows.win_file:
    path: "{{ windows_state_dir }}"
    state: directory

- name: Check forest marker
  ansible.windows.win_stat:
    path: "{{ windows_state_dir }}\\forest.done"
  register: forest_done

- name: 1.1 - Install AD DS Features and Reboot
  win_feature:
    name: 
      - AD-Domain-Services
      - RSAT-AD-PowerShell
      - DNS
    state: present
    include_management_tools: yes
  register: feature_install

- name: 1.2 - Reboot if Features were installed
  win_reboot:
  when: feature_install.changed

- name: 1.3 - Create AD forest
  win_shell: |
    $pw = ConvertTo-SecureString "{{ ad_safe_mode_password }}" -AsPlainText -Force
    # Import the module explicitly to be safe
    Import-Module ADDSDeployment
    Install-ADDSForest `
      -DomainName "{{ ad_domain_name }}" `
      -InstallDNS:$true `
      -SafeModeAdministratorPassword $pw `
      -Force:$true
    sync; Start-Sleep -Seconds 5
  when: not forest_done.stat.exists
  no_log: true
  notify: reboot

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 350
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 9000
    state: started
  delegate_to: localhost

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[kvm.split('.')[0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Wait for Windows SSH to be ready
  wait_for:
    host: "{{ br_nat_ip.stdout }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  delegate_to: localhost
  when: not skip_win_build

- name: Verify whoami Database Existence
  raw: |
    whoami
  register: whoami_check
  failed_when: "'False' in whoami_check.stdout"
- debug:
    var: whoami_check

- name: Verify AD Database Existence
  raw: |
    powershell.exe -Command "Test-Path C:\Windows\NTDS\ntds.dit"
  register: db_check
  failed_when: "'False' in db_check.stdout"

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 150
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 900
    state: started
  delegate_to: localhost

- name: Ensure AD services are running and verify
  ansible.windows.win_shell: |
    $services = "ntds", "adws", "kdc"
    foreach ($s in $services) {
        if (Get-Service $s -ErrorAction SilentlyContinue) {
            Set-Service $s -StartupType Automatic
            Start-Service $s -ErrorAction SilentlyContinue
        }
    }
    Get-Service $services -ErrorAction SilentlyContinue | Where-Object { $_.Status -ne "Running" }
  register: service_check
  # Only use become if the connection user is not an admin
  become: no 
  failed_when: 
    - service_check.rc != 0
    - (service_check.stdout | default('')) != ""

- name: Verify Forest Health (Service & Role Based)
  win_shell: !unsafe |
    $ErrorActionPreference = 'Stop'
    # 1. Check if the machine is a Domain Controller (Role 4 or 5)
    $Role = (Get-CimInstance Win32_ComputerSystem).DomainRole
    if ($Role -lt 4) { 
        Write-Error "Machine is not a Domain Controller (Role: $Role)"
        exit 1
    }

    # 2. Check critical AD services
    $Services = Get-Service ntds, adws, kdc, netlogon -ErrorAction SilentlyContinue
    foreach ($s in $Services) {
        if ($s.Status -ne 'Running') { 
            Write-Error "$($s.Name) is not running"
            exit 1
        }
    }
    
    # 3. If we made it here, recreate the state file if missing
    # Note: Using the hardcoded path or pass via env to avoid Jinja issues in !unsafe block
    $StateFile = "C:\k8s\forest.done" 
    if (!(Test-Path $StateFile)) {
        New-Item -Path $StateFile -ItemType File -Force
    }
    exit 0
  register: ad_health_check
  failed_when: false
  # become: yes
  # become_method: runas

- name: 1.4 - Ensure local Reverse Zone is ABSENT (Helper is the Source of Truth)
  vars:
    octets: "{{ hostvars[inventory_hostname]['provision_ip'].split('.')[:3] }}"
    rev_zone_name: "{{ octets | reverse | join('.') }}.in-addr.arpa"
  win_shell: |
    # We remove the local zone to force Windows to resolve via the Helper (10.0.0.20)
    if (Get-DnsServerZone -Name "{{ rev_zone_name }}" -ErrorAction SilentlyContinue) {
        Remove-DnsServerZone -Name "{{ rev_zone_name }}" -Force
        Write-Output "REMOVED_LOCAL_ZONE"
    }
  register: zone_removal
  changed_when: "'REMOVED_LOCAL_ZONE' in zone_removal.stdout"

- name: Set Windows DNS Client to use Helper
  ansible.windows.win_shell: |
    # Ensure Ethernet 2 (our lab network) uses the Helper (10.0.0.20)
    Set-DnsClientServerAddress -InterfaceAlias "Ethernet 2" -ServerAddresses ("10.0.0.20")
    ipconfig /flushdns
  changed_when: false

- name: Create PTR records in IPA for Windows nodes
  delegate_to: localhost
  vars:
    ipa_pass: "{{ lookup('env', 'ipa_admin_password') }}"
    short_name: "{{ inventory_hostname.split('.')[0] }}"
    provision_ip: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
    last_octet: "{{ provision_ip.split('.')[-1] }}"
    rev_zone: "{{ provision_ip.split('.')[:3] | reverse | join('.') }}.in-addr.arpa"
  ansible.builtin.shell: |
    echo "{{ ipa_pass }}" | kinit admin > /dev/null
    # Ensure the zone exists as a master zone first
    if ! ipa dnszone-show "{{ rev_zone }}" > /dev/null 2>&1; then
      ipa dnszone-add "{{ rev_zone }}"
    fi
    # Add the PTR record
    ipa dnsrecord-add "{{ rev_zone }}" "{{ last_octet }}" \
      --ptr-rec="{{ short_name }}.{{ ad_domain_name }}."
  register: ptr_result
  failed_when: 
    - ptr_result.rc != 0 
    - "'already exists' not in ptr_result.stderr"
  changed_when: "'Added record' in ptr_result.stdout"

- name: 1.6 - Enable Dynamic Updates and PTR Sync on Reverse Zone
  delegate_to: localhost
  vars:
    ipa_pass: "{{ lookup('env', 'ipa_admin_password') }}"
    provision_ip: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
    rev_zone: "{{ provision_ip.split('.')[:3] | reverse | join('.') }}.in-addr.arpa"
  ansible.builtin.shell: |
    echo "{{ ipa_pass }}" | kinit admin > /dev/null
    ipa dnszone-mod "{{ rev_zone }}" --dynamic-update=TRUE --allow-sync-ptr=TRUE
  register: zone_mod_result
  # Do not fail if the error is just that no changes were needed
  failed_when: 
    - zone_mod_result.rc != 0 
    - "'no modifications to be performed' not in zone_mod_result.stderr"
  # Only mark as changed if the error message is NOT present
  changed_when: 
    - zone_mod_result.rc == 0
    - "'no modifications to be performed' not in zone_mod_result.stderr"