# roles/rocky_k8s/tasks/configure_forest.yml
- name: Ensure state directory exists
  ansible.windows.win_file:
    path: "{{ windows_state_dir }}"
    state: directory

- name: Check forest marker
  ansible.windows.win_stat:
    path: "{{ windows_state_dir }}\\forest.done"
  register: forest_done

- name: 1.1 - Install AD DS Features and Reboot
  win_feature:
    name: 
      - AD-Domain-Services
      - RSAT-AD-PowerShell
      - DNS
    state: present
    include_management_tools: yes
  register: feature_install

- name: 1.2 - Reboot if Features were installed
  win_reboot:
  when: feature_install.changed

- debug:
    msg: 
      - "ad_safe_mode_password: {{ ad_safe_mode_password }}"
      - "ad_domain_name: {{ ad_domain_name }}"


- name: 1.3 - Create AD forest
  win_shell: |
    $pw = ConvertTo-SecureString "{{ ad_safe_mode_password }}" -AsPlainText -Force
    # Import the module explicitly to be safe
    Import-Module ADDSDeployment
    Install-ADDSForest `
      -DomainName "{{ ad_domain_name }}" `
      -InstallDNS:$true `
      -SafeModeAdministratorPassword $pw `
      -Force:$true
    sync; Start-Sleep -Seconds 5
  when: not forest_done.stat.exists
  notify: reboot

- name: Flush disk buffers (Windows Sync)
  raw: powershell.exe -NoProfile -NonInteractive -Command "Sync-Disk; [System.IO.File]::Flush((New-Object System.IO.FileStream('C:\temp.tmp', 'Create')).SafeFileHandle)"
  become: yes
  become_method: runas
  register: sync_result
  failed_when: false
  changed_when: false
  ignore_errors: yes

- name: Verify AD Database Existence
  raw: |
    powershell.exe -Command "Test-Path C:\Windows\NTDS\ntds.dit"
  register: db_check
  failed_when: "'False' in db_check.stdout"

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas

- name: Verify Forest Survival
  raw: powershell.exe -Command "Test-Path '{{ windows_state_dir }}\\forest.done'"
  register: forest_check
  become: yes
  become_method: runas

- name: Fail if forest was wiped by immutability
  fail:
    msg: "The server reverted to a clean state! Active Directory was lost."
  when: "'False' in forest_check.stdout"

- name: Ensure AD services are running (Raw Mode)
  raw: powershell.exe -Command "Set-Service ntds, adws, kdc -StartupType Automatic; Start-Service ntds, adws, kdc"
  become: yes
  become_method: runas

- name: Mark forest created (Raw Mode)
  raw: powershell.exe -Command "New-Item -Path '{{ windows_state_dir }}\\forest.done' -ItemType File -Force"
  become: yes
  become_method: runas
  when:
    - inventory_hostname == groups['win_worker_nodes'][0]
    - not forest_done.stat.exists

# - name: Configure Windows DNS Forwarders
#   community.windows.win_dns_server_settings:
#     forwarders:
#       - 10.0.0.20
#       - 8.8.8.8
#       - 1.1.1.1
#     forward_timeout: 3
#     recursion: yes

- name: Set DNS Forwarders using PowerShell
  ansible.windows.win_shell: |
    $targets = @("10.0.0.20", "8.8.8.8", "1.1.1.1")
    $current = (Get-DnsServerForwarder).IPAddress
    
    # Check if our targets are already set to avoid unnecessary changes
    if (Compare-Object $current $targets) {
        Set-DnsServerForwarder -IPAddress $targets -PassThru
    }
  register: dns_result
  changed_when: dns_result.stdout != ""