- name: Add A record for Windows node in IPA (Dynamic Zone)
  delegate_to: localhost
  when: "'win_worker_nodes' in group_names"
  ansible.builtin.shell: |
    # 1. Acquire Kerberos Ticket
    echo "{{ lookup('env', 'ipa_admin_password') }}" | kinit admin > /dev/null

    # 2. Automatically ensure the target zone exists inside FreeIPA first
    if ! ipa dnszone-show "{{ target_zone }}" > /dev/null 2>&1; then
      Write-Host "Creating missing forward zone in FreeIPA: {{ target_zone }}"
      ipa dnszone-add "{{ target_zone }}"
    fi

    # 3. Inject or update the dynamic zone A record
    ipa dnsrecord-add "{{ target_zone }}" "{{ cname_short }}" \
        --a-rec={{ hostvars[inventory_hostname]['provision_ip'] }} || \
    ipa dnsrecord-mod "{{ target_zone }}" "{{ cname_short }}" \
        --a-rec={{ hostvars[inventory_hostname]['provision_ip'] }}
  vars:
    # Safely targets 'cloud.home.example.ca' or 'cloud.home.example.lcl' based on your node details
    target_zone: "{{ hostvars[inventory_hostname]['domain'] | default('cloud.home.example.ca') }}"
    cname_short: "{{ inventory_hostname.split('.')[0] }}"
  register: a_rec_result
  failed_when:
    - a_rec_result.rc != 0
    - "'no modifications to be performed' not in a_rec_result.stderr"
    - "'already exists' not in a_rec_result.stderr"
  changed_when:
    - a_rec_result.rc == 0
    - "'Added record' in a_rec_result.stdout"

- name: Create PTR records in IPA for Windows nodes
  delegate_to: localhost
  become: yes
  become_method: runas
  vars:
    ipa_pass: "{{ lookup('env', 'ipa_admin_password') }}"
    short_name: "{{ inventory_hostname.split('.')[0] }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
    last_octet: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[-1] }}"
    rev_zone: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[:3] | reverse | join('.') }}.in-addr.arpa"
  ansible.builtin.shell: |
    echo "{{ ipa_pass }}" | kinit admin > /dev/null
    # Ensure the zone exists as a master zone first
    if ! ipa dnszone-show "{{ rev_zone }}" > /dev/null 2>&1; then
      ipa dnszone-add "{{ rev_zone }}"
    fi
    # Add the PTR record
    ipa dnsrecord-add "{{ rev_zone }}" "{{ last_octet }}" \
      --ptr-rec="{{ short_name }}.{{ ad_domain_name }}."
  register: ptr_result
  failed_when: 
    - ptr_result.rc != 0 
    - "'no modifications to be performed' not in ptr_result.stderr"
    - "'already exists' not in ptr_result.stderr"
  # CHANGE only if we actually added a new record
  changed_when: 
    - ptr_result.rc == 0
    - "'Added record' in ptr_result.stdout"


