# roles/rocky_k8s/tasks/configure_forest.yml
- name: Ensure state directory exists
  ansible.windows.win_file:
    path: "{{ windows_state_dir }}"
    state: directory

- name: Check forest marker
  ansible.windows.win_stat:
    path: "{{ windows_state_dir }}\\forest.done"
  register: forest_done

- name: 1.1 - Install AD DS Features and Reboot
  win_feature:
    name: 
      - AD-Domain-Services
      - RSAT-AD-PowerShell
      - DNS
    state: present
    include_management_tools: yes
  register: feature_install

- name: 1.2 - Reboot if Features were installed
  win_reboot:
  when: feature_install.changed

- name: 1.3 - Create AD forest
  win_shell: |
    $pw = ConvertTo-SecureString "{{ ad_safe_mode_password }}" -AsPlainText -Force
    # Import the module explicitly to be safe
    Import-Module ADDSDeployment
    Install-ADDSForest `
      -DomainName "{{ ad_domain_name }}" `
      -InstallDNS:$true `
      -SafeModeAdministratorPassword $pw `
      -Force:$true
    sync; Start-Sleep -Seconds 5
  when: not forest_done.stat.exists
  no_log: true
  notify: reboot

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 350
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 9000
    state: started
  delegate_to: localhost

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[kvm.split('.')[0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Wait for Windows SSH to be ready
  wait_for:
    host: "{{ br_nat_ip.stdout }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  delegate_to: localhost
  when: not skip_win_build

- name: Verify whoami Database Existence
  raw: |
    whoami
  register: whoami_check
  failed_when: "'False' in whoami_check.stdout"
- debug:
    var: whoami_check

- name: Verify AD Database Existence
  raw: |
    powershell.exe -Command "Test-Path C:\Windows\NTDS\ntds.dit"
  register: db_check
  failed_when: "'False' in db_check.stdout"

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 150
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 900
    state: started
  delegate_to: localhost

- name: Ensure AD services are running and verify
  ansible.windows.win_shell: |
    $services = "ntds", "adws", "kdc"
    foreach ($s in $services) {
        if (Get-Service $s -ErrorAction SilentlyContinue) {
            Set-Service $s -StartupType Automatic
            Start-Service $s -ErrorAction SilentlyContinue
        }
    }
    Get-Service $services -ErrorAction SilentlyContinue | Where-Object { $_.Status -ne "Running" }
  register: service_check
  # Only use become if the connection user is not an admin
  become: no 
  failed_when: 
    - service_check.rc != 0
    - (service_check.stdout | default('')) != ""

- name: Verify Forest Health (Service & Role Based)
  win_shell: !unsafe |
    $ErrorActionPreference = 'Stop'
    # 1. Check if the machine is a Domain Controller (Role 4 or 5)
    $Role = (Get-CimInstance Win32_ComputerSystem).DomainRole
    if ($Role -lt 4) { 
        Write-Error "Machine is not a Domain Controller (Role: $Role)"
        exit 1
    }

    # 2. Check critical AD services
    $Services = Get-Service ntds, adws, kdc, netlogon -ErrorAction SilentlyContinue
    foreach ($s in $Services) {
        if ($s.Status -ne 'Running') { 
            Write-Error "$($s.Name) is not running"
            exit 1
        }
    }
    
    # 3. If we made it here, recreate the state file if missing
    # Note: Using the hardcoded path or pass via env to avoid Jinja issues in !unsafe block
    $StateFile = "C:\k8s\forest.done" 
    if (!(Test-Path $StateFile)) {
        New-Item -Path $StateFile -ItemType File -Force
    }
    exit 0
  register: ad_health_check
  failed_when: false
  # become: yes
  # become_method: runas

- name: 1.4 - Create Reverse Lookup Zone via PowerShell
  win_shell: |
    $zoneName = "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[:3] | reverse | join('.') }}.in-addr.arpa"
    
    # Check if the zone exists first to avoid errors
    if (-not (Get-DnsServerZone -Name $zoneName -ErrorAction SilentlyContinue)) {
        Write-Output "Creating Reverse Zone: $zoneName"
        # Using NetworkID for the primary zone creation
        Add-DnsServerPrimaryZone -NetworkId "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[:3] | join('.') }}.0/24" -ReplicationScope "Forest"
        
        # Removed Export-DnsServerZone as it is redundant for AD-integrated zones and missing mandatory parameters
    } else {
        Write-Output "Zone $zoneName already exists."
    }
  when: inventory_hostname == groups['win_worker_nodes'][0]

- name: insure dc are in dns
  ansible.windows.win_shell: |
    # Force the OS to register its IP
    ipconfig /registerdns
    # Give it a moment to talk to the DNS service
    Start-Sleep -Seconds 5
    # Force Netlogon to register AD-specific records
    nltest /dsregdns
  register: dns_register
  changed_when: true

- name: Configure IPA to forward AD domain requests to Windows DCs
  delegate_to: localhost
  vars:
    ipa_pass: "{{ lookup('env', 'ipa_admin_password') }}"
    win_dc01: "{{ hostvars[groups['win_worker_nodes'][0]]['provision_ip'] }}"
    win_dc02: "{{ hostvars[groups['win_worker_nodes'][1]]['provision_ip'] }}"
  ansible.builtin.shell: |
    echo "{{ ipa_pass }}" | kinit admin
    if ! ipa dnsforwardzone-show {{ ad_domain_name }} > /dev/null 2>&1; then
      ipa dnsforwardzone-add {{ ad_domain_name }} \
        --forwarder={{ win_dc01 }} \
        --forwarder={{ win_dc02 }} \
        --forward-policy=first
      echo "CHANGED"
    fi
  register: ipa_dns_result
  changed_when: "'CHANGED' in ipa_dns_result.stdout"
  when: inventory_hostname == groups['win_worker_nodes'][0]
  no_log: true

- name: Configure IPA Reverse Forwarding and CNAME Bridge
  delegate_to: localhost
  vars: 
    ipa_pass: "{{ lookup('env', 'ipa_admin_password') }}"
    short_name: "{{ inventory_hostname.split('.')[0] }}"
    # Pre-calculating these prevents the shell block from getting "unbalanced"
    rev_zone: "{{ hostvars[short_name]['provision_ip'].split('.')[:3] | reverse | join('.') }}.in-addr.arpa"
    local_domain: "{{ ad_domain_name.replace('.lcl', '.local') }}"
    win_dc01: "{{ hostvars[groups['win_worker_nodes'][0]]['provision_ip'] }}"
    win_dc02: "{{ hostvars[groups['win_worker_nodes'][1]]['provision_ip'] }}"
  ansible.builtin.shell: |
    set -e
    echo "{{ ipa_pass }}" | kinit admin > /dev/null
    
    # 1. Add the Reverse Forward Zone
    if ! ipa dnsforwardzone-show "{{ rev_zone }}" > /dev/null 2>&1; then
      ipa dnsforwardzone-add "{{ rev_zone }}" \
        --forwarder="{{ win_dc01 }}" \
        --forwarder="{{ win_dc02 }}" \
        --forward-policy=first
      echo "REVERSE_CHANGED"
    fi

    # 2. Create the CNAME Bridge
    ipa dnsrecord-add "{{ local_domain }}" "{{ short_name }}" \
      --cname-rec="{{ short_name }}.{{ ad_domain_name }}." || true
  register: ipa_bridge_result
  changed_when: "'REVERSE_CHANGED' in ipa_bridge_result.stdout"
  no_log: true
  

- name: Set DNS Forwarders using PowerShell
  ansible.windows.win_shell: |
    $targets = @("10.0.0.20", "8.8.8.8", "1.1.1.1")
    $current = (Get-DnsServerForwarder).IPAddress
    
    # Check if our targets are already set to avoid unnecessary changes
    if (Compare-Object $current $targets) {
        Set-DnsServerForwarder -IPAddress $targets -PassThru
    }
  register: dns_result
  changed_when: dns_result.stdout != ""

