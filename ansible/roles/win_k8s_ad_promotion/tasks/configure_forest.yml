- name: 1.5 - Configure Split-Horizon (Internal vs Internet)
  vars:
    n_ip: "{{ br_nat_ip.stdout | trim }}"
    p_ip: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
  ansible.windows.win_shell: |
    $natIdx = (Get-NetIPAddress -IPAddress "{{ n_ip }}").InterfaceIndex
    $clusterIdx = (Get-NetIPAddress -IPAddress "{{ p_ip }}").InterfaceIndex

    # 1. Strip the Gateway from NIC 2 (Internal/AD)
    # This prevents the "Destination port unreachable" and 10.0.0.1 interference
    Set-NetIPAddress -InterfaceIndex $clusterIdx -DefaultGateway $null -ErrorAction SilentlyContinue

    # 2. Set Interface Metrics
    # NIC 1 (Internet) gets high priority (Low number)
    Set-NetIPInterface -InterfaceIndex $natIdx -InterfaceMetric 10
    # NIC 2 (Internal) gets low priority (High number) for general traffic
    Set-NetIPInterface -InterfaceIndex $clusterIdx -InterfaceMetric 500

    # 3. Clean the Routing Table
    # Nuke the persistent and active 10.0.0.1 gateways
    route delete 0.0.0.0 mask 0.0.0.0 10.0.0.1 2>$null

    # 4. Add the "Internal Boss" Route
    # This forces EVERYTHING destined for 10.x.x.x to stay on NIC 2
    route -p add 10.0.0.0 mask 255.0.0.0 0.0.0.0 metric 1 if $clusterIdx

- name: 1.3 - Create AD forest
  win_shell: |
    $pw = ConvertTo-SecureString "{{ ad_safe_mode_password }}" -AsPlainText -Force
    # Import the module explicitly to be safe
    Import-Module ADDSDeployment
    Install-ADDSForest `
      -DomainName "{{ ad_domain_name }}" `
      -InstallDNS:$true `
      -SafeModeAdministratorPassword $pw `
      -Force:$true
    sync; Start-Sleep -Seconds 5
  when: not forest_done.stat.exists
  no_log: true
  notify: reboot

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 350
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
    timeout: 9000
    state: started
  delegate_to: localhost

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[kvm.split('.')[0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Wait for Windows SSH to be ready
  wait_for:
    host: "{{ br_nat_ip.stdout }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  delegate_to: localhost
  when: not skip_win_build

- name: Verify whoami Database Existence
  raw: |
    whoami
  register: whoami_check
  failed_when: "'False' in whoami_check.stdout"
- debug:
    var: whoami_check

- name: Verify AD Database Existence
  raw: |
    powershell.exe -Command "Test-Path C:\Windows\NTDS\ntds.dit"
  register: db_check
  failed_when: "'False' in db_check.stdout"

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas

- name: We need to wait for the server to come back up after promotion before we can do anything else
  wait_for:
    delay: 10
    timeout: 150
    state: started
  delegate_to: localhost

- name: Wait for Windows SSH to be ready
  vars:
    provision: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
  wait_for:
    host: "{{ provision }}"
    port: 22
    delay: 10
