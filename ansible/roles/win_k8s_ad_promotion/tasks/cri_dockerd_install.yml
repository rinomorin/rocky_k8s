
# 1.10 - Get URL and set fact for all hosts
- name: 1.10 - Fetch URL and set facts
  block:
    - name: Fetch URL from GitHub
      ansible.builtin.shell: >
        curl -k -s https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest | 
        jq -r '.assets[] | select(.name | contains("win.amd64.zip")) | .browser_download_url'
      delegate_to: localhost
      register: cri_url_raw
      changed_when: false

    - debug:
        msg: "cri_url_raw: {{ cri_url_raw.stdout }}"

    - name: Set download_url for all hosts
      ansible.builtin.set_fact:
        download_url: "{{ cri_url_raw.stdout | trim }}"
      # This ensures every host in the play gets this variable
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ ansible_play_hosts }}"

# # 1.10.1 - Set the fact for EVERYONE 
# # We use 'default' to prevent the crash if the variable is missing
# - name: 1.10.1 - Set cri download URL fact
#   ansible.builtin.set_fact:
#     download_url: "{{ hostvars['localhost']['cri_url_raw'].stdout | default('') | trim }}"

- debug:
    msg: "download_url: {{ download_url }}"

# 1.10.2 - Download and unzip (This will only run if download_url is set)
- name: 1.10.2 - Download and unzip on Windows host
  block:
    - name: Download zip via BITS
      ansible.windows.win_get_url:
        url: "{{ download_url }}"
        dest: "C:\\Windows\\Temp\\cri-dockerd.zip"

    - name: Extract zip to destination
      community.windows.win_unzip:
        src: "C:\\Windows\\Temp\\cri-dockerd.zip"
        dest: "C:\\Program Files\\"
        delete_archive: yes
  when: download_url != ''
  become: yes
  become_method: runas
  become_user: Administrator

