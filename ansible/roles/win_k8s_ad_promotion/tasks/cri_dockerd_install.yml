# 1.10 - Get latest release URL - Runs once, on localhost
- name: 1.10 - Get latest cri-dockerd release URL
  ansible.builtin.shell: >
    curl -k -s https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest | 
    jq -r '.assets[] | select(.name | contains("win.amd64.zip")) | .browser_download_url'
  delegate_to: localhost
  run_once: true
  register: cri_url_raw

# 1.10.1 - Set the fact for EVERYONE 
# We use 'default' to prevent the crash if the variable is missing
- name: 1.10.1 - Set cri download URL fact
  ansible.builtin.set_fact:
    download_url: "{{ hostvars['localhost']['cri_url_raw'].stdout | default('') | trim }}"

# 1.10.2 - Download and unzip (This will only run if download_url is set)
- name: 1.10.2 - Download and unzip on Windows host
  block:
    - name: Download zip via BITS
      ansible.windows.win_get_url:
        url: "{{ download_url }}"
        dest: "C:\\Windows\\Temp\\cri-dockerd.zip"

    - name: Extract zip to destination
      community.windows.win_unzip:
        src: "C:\\Windows\\Temp\\cri-dockerd.zip"
        dest: "C:\\Program Files\\cri-dockerd"
        delete_archive: yes
  when: download_url != ''
  become: yes
  become_method: runas
  become_user: Administrator

# 1.10.4 - Deploy to Windows
- name: 1.10.4 - Create install directory
  ansible.windows.win_file:
    path: "C:\\Program Files\\cri-dockerd"
    state: directory

- name: 1.10.5 - Copy binary to Windows
  ansible.windows.win_copy:
    src: "/tmp/cri-dockerd-extract/cri-dockerd.exe"
    dest: "C:\\Program Files\\cri-dockerd\\cri-dockerd.exe"

- name: 1.11 - Copy and run installation script
  block:
    - name: Copy script to remote
      ansible.windows.win_copy:
        # We go up one level from 'tasks' to the role root, then into 'files'
        src: ../files/install_cri.ps1
        dest: C:\Windows\Temp\install_cri.ps1
      become: yes
      become_method: runas
      become_user: Administrator

    - name: Execute installation script
      ansible.windows.win_shell: C:\Windows\Temp\install_cri.ps1
      become: yes
      become_method: runas
      become_user: Administrator
      