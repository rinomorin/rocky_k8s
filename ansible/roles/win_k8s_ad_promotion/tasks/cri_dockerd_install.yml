# 1.10 - Get latest URL (Keep local as it is fast)
- name: 1.10 - Get latest cri-dockerd release URL
  ansible.builtin.shell: >
    curl -k -s https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest | 
    jq -r '.assets[] | select(.name | contains("win.amd64.zip")) | .browser_download_url'
  delegate_to: localhost
  run_once: true
  register: cri_url_raw
  changed_when: false

- name: 1.10.1 - Set download URL
  ansible.builtin.set_fact:
    download_url: "{{ cri_url_raw.stdout | trim }}"

# 1.10.2 - Download and Extract Natively on Windows
- name: 1.10.2 - Deploy cri-dockerd natively on Windows
  ansible.windows.win_shell: |
    $url = "{{ download_url }}"
    $zipDest = "C:\Windows\Temp\cri.zip"
    $extractPath = "C:\Program Files\cri-dockerd"
    
    # Download
    Invoke-WebRequest -Uri $url -OutFile $zipDest
    
    # Create directory and extract
    if (!(Test-Path $extractPath)) { New-Item -ItemType Directory -Path $extractPath -Force }
    Expand-Archive -Path $zipDest -DestinationPath $extractPath -Force
    
    # Clean up
    Remove-Item $zipDest -Force
  become: yes
  become_method: runas
  become_user: Administrator

# 1.10.4 - Deploy to Windows
- name: 1.10.4 - Create install directory
  ansible.windows.win_file:
    path: "C:\\Program Files\\cri-dockerd"
    state: directory

- name: 1.10.5 - Copy binary to Windows
  ansible.windows.win_copy:
    src: "/tmp/cri-dockerd-extract/cri-dockerd.exe"
    dest: "C:\\Program Files\\cri-dockerd\\cri-dockerd.exe"

- name: 1.11 - Copy and run installation script
  block:
    - name: Copy script to remote
      ansible.windows.win_copy:
        # We go up one level from 'tasks' to the role root, then into 'files'
        src: ../files/install_cri.ps1
        dest: C:\Windows\Temp\install_cri.ps1
      become: yes
      become_method: runas
      become_user: Administrator

    - name: Execute installation script
      ansible.windows.win_shell: C:\Windows\Temp\install_cri.ps1
      become: yes
      become_method: runas
      become_user: Administrator
      