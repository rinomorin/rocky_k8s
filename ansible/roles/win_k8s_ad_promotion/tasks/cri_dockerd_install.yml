---
# 1.10 - 1.11.4: CRI-Dockerd Installation and Service Registration

- name: 1.10 - Get latest cri-dockerd release URL
  ansible.builtin.shell: >
    curl -k -s https://api.github.com/repos/Mirantis/cri-dockerd/releases/latest | 
    jq -r '.assets[] | select(.name | contains("win.amd64.zip")) | .browser_download_url'
  delegate_to: localhost
  run_once: true
  register: cri_url_raw
  changed_when: false

- name: 1.10.1 - Download/Extract Flow
  block:
    - name: Download to controller
      ansible.builtin.get_url:
        url: "{{ cri_url_raw.stdout | trim }}"
        dest: "/tmp/cri-dockerd-windows.zip"
      delegate_to: localhost
      run_once: true

    - name: Ensure directories exist
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - C:\staging
        - C:\Program Files\cri-dockerd

    - name: Copy to Windows
      ansible.windows.win_copy:
        src: "/tmp/cri-dockerd-windows.zip"
        dest: "C:\\Windows\\Temp\\cri-dockerd-windows.zip"

    - name: Unzip
      community.windows.win_unzip:
        src: "C:\\Windows\\Temp\\cri-dockerd-windows.zip"
        dest: "C:\\staging\\"
        delete_archive: yes

- name: 1.11 - Relocate Binary and Setup PATH
  ansible.windows.win_shell: |
    $source = Get-ChildItem -Path "C:\staging\" -Filter "cri-dockerd.exe" -Recurse | Select-Object -First 1
    $dest = "C:\Program Files\cri-dockerd\cri-dockerd.exe"
    Copy-Item -Path $source.FullName -Destination $dest -Force
    
    $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
    if ($path -notlike "*cri-dockerd*") {
        [Environment]::SetEnvironmentVariable("Path", "$path;C:\Program Files\cri-dockerd", "Machine")
    }

- name: 1.11.2 - Register cri-dockerd Service
  ansible.windows.win_shell: |
    # Stop/Delete existing
    Stop-Service -Name "cri-dockerd" -Force -ErrorAction SilentlyContinue
    sc.exe delete "cri-dockerd"
    
    # Precise sc.exe syntax: space after binPath= and start=
    $binPath = "C:\Program Files\cri-dockerd\cri-dockerd.exe --container-runtime-endpoint npipe:////./pipe/cri-dockerd"
    sc.exe create "cri-dockerd" binPath= "`"$binPath`"" start= auto obj= "LocalSystem"
    
    # Set Security Right (SeCreateGlobalPrivilege)
    $tmpCfg = "C:\Windows\Temp\privs.inf"
    secedit /export /cfg $tmpCfg /areas USER_RIGHTS
    (Get-Content $tmpCfg) -replace 'SeCreateGlobalPrivilege =', 'SeCreateGlobalPrivilege = *S-1-5-18,' | Set-Content $tmpCfg
    secedit /configure /db C:\windows\security\database\edb.db /cfg $tmpCfg /areas USER_RIGHTS
    
    # Configure Timeout
    Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control -Name "ServicesPipeTimeout" -Value 60000

- name: 1.11.4 - Start and Verify Service
  ansible.windows.win_service:
    name: cri-dockerd
    state: started
    start_mode: auto