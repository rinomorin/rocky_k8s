# 1.1 - Resolve latest K8s and Docker versions via Controller
- name: 1.1 - Resolve latest K8s and Docker versions
  ansible.builtin.uri:
    url: "{{ item.url }}"
    return_content: yes
  delegate_to: localhost
  register: version_lookups
  loop:
    - { name: 'k8s', url: "https://dl.k8s.io/release/stable-{{ kubernetes_version }}.txt" }
    - { name: 'docker', url: "https://download.docker.com/win/static/stable/x86_64/latest.txt" }

- name: 1.2 - Set Version Facts
  ansible.builtin.set_fact:
    k8s_actual_version: "{{ version_lookups.results[0].content | trim }}"
    docker_actual_version: "{{ version_lookups.results[1].content | trim }}"

- name: 1.3 - Ensure Chocolatey is installed
  chocolatey.chocolatey.win_chocolatey:
    name: chocolatey
    state: present
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"

- name: 1.4 - Download and Extract Docker Engine ({{ docker_actual_version }})
  ansible.windows.win_shell: |
    $url = "https://download.docker.com/win/static/stable/x86_64/docker-{{ docker_actual_version }}.zip"
    $dest = "$env:TEMP\docker.zip"
    curl.exe -L $url -o $dest
    Expand-Archive -Path $dest -DestinationPath "C:\Program Files" -Force
    Remove-Item $dest
  args:
    creates: C:\Program Files\Docker\docker.exe
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"
  register: docker_install

- name: 1.5 - Enable Windows Features (Containers and Hyper-V)
  ansible.windows.win_feature:
    name:
      - Containers
      - Microsoft-Hyper-V
    state: present
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"
  register: feature_install

- name: 1.6 - Download Kubernetes Binaries ({{ k8s_actual_version }})
  ansible.windows.win_shell: |
    $binaries = @("kubelet", "kubeadm", "kubectl")
    foreach ($bin in $binaries) {
        $url = "https://dl.k8s.io/release/{{ k8s_actual_version }}/bin/windows/amd64/$bin.exe"
        curl.exe -L $url -o "C:\Windows\System32\$bin.exe"
    }
  args:
    creates: C:\Windows\System32\kubeadm.exe
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"

- name: 1.7 - Create Kubernetes Config Directory
  ansible.windows.win_file:
    path: C:\etc\kubernetes
    state: directory

- name: 1.8 - Flush File System Buffers (Disk Sync)
  ansible.windows.win_shell: |
    $volumes = Get-Volume | Where-Object { $_.DriveLetter -ne $null }
    foreach ($vol in $volumes) {
        [System.IO.File]::Create("$($vol.DriveLetter):\sync.tmp").Dispose()
        Remove-Item "$($vol.DriveLetter):\sync.tmp"
    }
  when: feature_install.reboot_required or docker_install.changed
  ignore_errors: yes

- name: 1.9 - Reboot to finalize Features
  ansible.windows.win_reboot:
    msg: "Rebooting for Hyper-V and Containers features"
    reboot_timeout: 900
  become: no
  when: feature_install.reboot_required or docker_install.changed