---
# docker_install.yml - Headless Environment Prep for Server Core
- name: 1.1 - Resolve latest patch version for K8s {{ kubernetes_version }}
  ansible.builtin.uri:
    url: "https://dl.k8s.io/release/stable-{{ kubernetes_version }}.txt"
    return_content: yes
  # Run this on the Ansible controller, not the Windows node
  delegate_to: localhost
  register: k8s_patch_resolve

- name: 1.2 - Set actual version fact
  ansible.builtin.set_fact:
    k8s_actual_version: "{{ k8s_patch_resolve.content | trim }}"

- name: 1.3 - Install Chocolatey
  ansible.windows.win_shell: |
    Set-ExecutionPolicy Bypass -Scope Process -Force;
    [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072;
    iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
  args:
    creates: C:\ProgramData\chocolatey\bin\choco.exe
  # This is the magic sauce for Error 5
  become: yes
  become_method: runas
  become_user: core

- name: 1.4 - Install Docker Microsoft Provider
  community.windows.win_psmodule:
    name: DockerMsftProvider
    state: present
  
- name: 1.5 - Install Docker Engine (Headless)
  ansible.windows.win_shell: |
    Install-Package -Name docker -ProviderName DockerMsftProvider -Force
  args:
    creates: C:\Program Files\Docker\docker.exe
  register: docker_install

- name: 1.6 - Enable Windows Features (Containers and Hyper-V)
  ansible.windows.win_feature:
    name:
      - Containers
      - Microsoft-Hyper-V
    state: present
  register: feature_install

- name: 1.7 - Download Kubernetes Binaries ({{ k8s_actual_version }})
  ansible.windows.win_get_url:
    url: "https://dl.k8s.io/release/{{ k8s_actual_version }}/bin/windows/amd64/{{ item }}.exe"
    dest: "C:\\Windows\\System32\\{{ item }}.exe"
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: 1.8 - Create Kubernetes Config Directory
  ansible.windows.win_file:
    path: C:\etc\kubernetes
    state: directory

- name: 1.9 - Flush File System Buffers (Disk Sync)
  ansible.windows.win_shell: |
    # Explicitly flush all volumes to prevent corruption on immutable nodes
    $volumes = Get-Volume | Where-Object { $_.DriveLetter -ne $null }
    foreach ($vol in $volumes) {
        Write-Output "Syncing $($vol.DriveLetter):"
        # Using the shell to trigger a flush of all metadata and data
        [System.IO.File]::Create("$($vol.DriveLetter):\sync.tmp").Dispose()
        Remove-Item "$($vol.DriveLetter):\sync.tmp"
    }
  when: feature_install.reboot_required or docker_install.changed
  ignore_errors: yes

- name: 1.10 - Reboot to finalize Features
  ansible.windows.win_reboot:
    msg: "Rebooting for Hyper-V and Containers features"
    reboot_timeout: 900
  become: no
  when: feature_install.reboot_required or docker_install.changed