---
# docker_install.yml - Zero-Hardcode Dynamic Installation

- name: 1.1 - Resolve latest K8s and Docker versions
  ansible.builtin.uri:
    url: "{{ item.url }}"
    return_content: yes
  delegate_to: localhost
  register: version_lookups
  loop:
    - { name: 'k8s', url: "https://dl.k8s.io/release/stable-{{ kubernetes_version }}.txt" }
    # This URL returns the latest stable Docker version string for Windows
    - { name: 'docker', url: "https://download.docker.com/win/static/stable/x86_64/latest.txt" }

- name: 1.2 - Set Version Facts
  ansible.builtin.set_fact:
    k8s_actual_version: "{{ version_lookups.results[0].content | trim }}"
    docker_actual_version: "{{ version_lookups.results[1].content | trim }}"

- name: 1.3 - Ensure Chocolatey is installed
  chocolatey.chocolatey.win_chocolatey:
    name: chocolatey
    state: present
  become: yes
  become_method: runas
  become_user: Administrator

# docker_install.yml - Zero-Hardcode Dynamic Installation
- name: 1.4 - Download and Extract Docker Engine (Dynamic Version)
  ansible.windows.win_shell: |
    $version = "{{ docker_actual_version }}"
    $url = "https://download.docker.com/win/static/stable/x86_64/docker-$version.zip"
    $dest = "$env:TEMP\docker.zip"
    
    Write-Output "Fetching Docker version: $version"
    curl.exe -L $url -o $dest
    Expand-Archive -Path $dest -DestinationPath "C:\Program Files" -Force
    Remove-Item $dest
  args:
    creates: C:\Program Files\Docker\docker.exe
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"

- name: 1.5 - Download Kubernetes Binaries ({{ k8s_actual_version }})
  ansible.windows.win_shell: |
    $binaries = @("kubelet", "kubeadm", "kubectl")
    foreach ($bin in $binaries) {
        $url = "https://dl.k8s.io/release/{{ k8s_actual_version }}/bin/windows/amd64/$bin.exe"
        curl.exe -L $url -o "C:\Windows\System32\$bin.exe"
    }
  args:
    creates: C:\Windows\System32\kubeadm.exe
  become: yes
  become_method: runas
  become_user: Administrator
  vars:
    ansible_become_password: "{{ ad_safe_mode_password }}"

