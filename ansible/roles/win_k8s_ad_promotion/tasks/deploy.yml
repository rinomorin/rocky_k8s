# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------
- name: Force hostname into Registry
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ComputerName
    name: ComputerName
    data: "{{ inventory_hostname.split('.')[0] }}"
    type: string

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

- name: Force Active Hostname into Registry
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
    name: "{{ item }}"
    data: "{{ inventory_hostname.split('.')[0] }}"
    type: string
  loop:
    - Hostname
    - "NV Hostname"
  notify: reboot

- name: Flush disk buffers (Windows Sync)
  become: yes
  become_method: runas
  failed_when: false
  register: sync_result
  changed_when: sync_result.rc == 0
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "Write-VolumeCache -DriveLetter C; fsutil volume dismount C:"
  ignore_errors: yes

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

