# roles/rocky_k8s/tasks/deploy.yml

- name: 1.1 - Find the latest gi-win base image
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    virsh list --name --all | grep "gi-win" | head -n 1
  register: base_image_name

- name: 1.2 - Create Linked Clone and Define Windows VM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
    vm_name: "{{ inventory_hostname.split('.')[0] }}"
    base_qcow2: "/var/lib/libvirt/images/{{ base_image_name.stdout }}.qcow2"
    target_qcow2: "/var/lib/libvirt/images/{{ vm_name }}.qcow2"
  when: not skip_win_build
  shell: |
    # 1. Create the Differencing Disk (Linked Clone)
    qemu-img create -F qcow2 -f qcow2 -b {{ base_qcow2 }} {{ target_qcow2 }}
    
    # 2. Fix Permissions
    chmod 644 {{ target_qcow2 }}
    chown qemu:qemu {{ target_qcow2 }}

    # 3. Install the VM
    virt-install \
      --name {{ vm_name }} \
      --memory 6144 \
      --vcpus 4 \
      --disk path={{ target_qcow2 }},bus=sata \
      --import \
      --os-variant win2k22 \
      --network bridge=br-nat,model=e1000e \
      --network bridge=br-cluster,model=e1000e \
      --graphics vnc,listen=0.0.0.0 \
      --noautoconsole \
      --boot uefi

- name: "Power On {{ inventory_hostname.split('.')[0] }}"
  become: yes
  delegate_to: "{{ kvm_ip }}"
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    virsh start "{{ inventory_hostname.split('.')[0] }}"
  register: start_res
  failed_when: 
    - start_res.rc != 0 
    - "'already active' not in start_res.stderr"
  changed_when: 
    - start_res.rc == 0

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

# ------------------------------------------------------------
# Discover maintenance NIC (br-nat) IP via KVM
# ------------------------------------------------------------

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Fail if br-nat IP not found
  assert:
    that:
      - br_nat_ip.stdout | length > 0
    fail_msg: >
      Unable to discover br-nat IP for {{ inventory_hostname }} from KVM.

- name: Wait for Windows SSH to be ready
  wait_for:
    host: "{{ br_nat_ip.stdout }}"
    port: 22
    delay: 10
    timeout: 300
    state: started
  delegate_to: localhost
  when: not skip_win_build

# ------------------------------------------------------------
# Connect via br-nat
# ------------------------------------------------------------
- name: Set Administrator password for first login
  delegate_to: localhost
  become: false
  shell: |
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i .ssh/id_rsa -T core@{{ br_nat_ip.stdout }} \
    "powershell -Command \"[adsi]'WinNT://./Administrator,user' | %{ \$_.SetPassword('On32Build4SysAdmin'); \$_.SetInfo() }\""
  when: not skip_win_build

- name: Use br-nat IP for SSH
  set_fact:
    ansible_host: "{{ br_nat_ip.stdout }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
    provision_gw: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[0:3] | join('.') }}.1"

# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------
- name: show defined ips
  debug:
    msg: 
      - "Provision IP: {{ provision_ip }}, Provision GW: {{ provision_gw }}"
      - "provision_gw: {{ provision_gw }}"
      - "ansible_host: {{ ansible_host }}"
      
- name: Compute br-cluster network parameters
  delegate_to: localhost
  set_fact:
    br_cluster_net: >-
      {{ hostvars[groups['kvm'][0]].libvirt_networks
         | selectattr('name','equalto','br-cluster')
         | first }}

- name: Render NIC provisioning script locally
  delegate_to: localhost
  vars:
    provision_ip: "{{ hostvars[inventory_hostname]['provision_ip'] }}"
    provision_gw: "{{ br_cluster_net.cidr.split('/')[0].split('.')[:3] | join('.') }}.1"
    provision_prefix: "{{ br_cluster_net.cidr.split('/')[-1] | int }}" 
  template:
    src: update_nic_provision.ps1.j2
    dest: "/tmp/update_nic_provision_{{ inventory_hostname.split('.')[0] }}.ps1"
    mode: '0644'
    force: true

- name: Ensure Windows is responsive before copy
  wait_for_connection:
    timeout: 60

- name: Copy rendered script to Windows host
  win_copy:
    src: "/tmp/update_nic_provision_{{ inventory_hostname.split('.')[0] }}.ps1"
    dest: 'C:\Windows\Temp\update_nic_provision.ps1'
    force: yes

- name: Use br-nat IP for SSH
  set_fact:
    ansible_host: "{{ br_nat_ip.stdout }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
    provision_gw: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[0:3] | join('.') }}.1"

- name: Create one-time task to update IP
  win_scheduled_task:
    name: "UpdateNIC"
    actions:
      - path: powershell.exe
        arguments: -NoProfile -ExecutionPolicy Bypass -File C:\Windows\Temp\update_nic_provision.ps1
    triggers:
      - type: registration
    state: present
    enabled: yes
    user: SYSTEM
    run_level: highest

- name: Wait for connection on the NEW IP
  wait_for:
    host: "{{ provision_ip }}" # Use the new IP if it changed
    port: 22
    delay: 15
    timeout: 300
  delegate_to: localhost

- name: Total Purge and Re-provision IPv4
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "$n=(Get-NetAdapter | ?{(Get-NetIPAddress -InterfaceIndex $_.InterfaceIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue).IPAddress -notlike '172.*'})[0]; if($n){Write-Host \"###$($n.Name)###\"}else{exit 1}"
  register: ip_config_result
  
# - name: Verify Address State
#   raw: powershell.exe -NoProfile -NonInteractive -Command "Get-NetIPAddress -InterfaceAlias '{{ br_cluster_nic }}' -AddressFamily IPv4 | Select-Object IPAddress, AddressState"

# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------
- name: get current hostname
  raw: powershell.exe -NoProfile -NonInteractive -Command "hostname"
  register: current_hostname
  changed_when: false

- name: Force hostname into Registry
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Control\ComputerName\ComputerName
    name: ComputerName
    data: "{{ inventory_hostname.split('.')[0] }}"
    type: string

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

- name: Force Active Hostname into Registry
  win_regedit:
    path: HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
    name: "{{ item }}"
    data: "{{ inventory_hostname.split('.')[0] }}"
    type: string
  loop:
    - Hostname
    - "NV Hostname"
  notify: reboot

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting to apply hostname: {{ inventory_hostname.split('.') }}"
  when: rename_result.changed

- name: get current hostname again
  raw: powershell.exe -NoProfile -NonInteractive -Command "hostname"
  register: current_hostname2
  changed_when: false

- name: Debug hostname change results
  debug:
    msg: 
      - "Current Hostname before change: {{ current_hostname.stdout }}"
      - "Current Hostname after change: {{ current_hostname2.stdout }}"
      - "Desired Hostname: {{ inventory_hostname.split('.')[0] }}"
      - "Rename Result: {{ rename_result }}"  

- name: Flush disk buffers (Windows Sync)
  become: yes
  become_method: runas
  failed_when: false
  register: sync_result
  changed_when: sync_result.rc == 0
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "Write-VolumeCache -DriveLetter C; fsutil volume dismount C:"
  ignore_errors: yes


- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting to apply hostname: {{ inventory_hostname.split('.') }}"
  when: rename_result.changed


- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas
  when: current_hostname.stdout != hostname