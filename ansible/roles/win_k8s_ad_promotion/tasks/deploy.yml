# roles/rocky_k8s/tasks/deploy.yml

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

# ------------------------------------------------------------
# Discover maintenance NIC (br-nat) IP via KVM
# ------------------------------------------------------------

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Fail if br-nat IP not found
  assert:
    that:
      - br_nat_ip.stdout | length > 0
    fail_msg: >
      Unable to discover br-nat IP for {{ inventory_hostname }} from KVM.

# ------------------------------------------------------------
# Connect via br-nat
# ------------------------------------------------------------

- name: Use br-nat IP for SSH
  set_fact:
    ansible_host: "{{ br_nat_ip.stdout }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
    provision_gw: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[0:3] | join('.') }}.1"

