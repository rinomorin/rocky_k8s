# roles/rocky_k8s/tasks/deploy.yml

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

# ------------------------------------------------------------
# Discover maintenance NIC (br-nat) IP via KVM
# ------------------------------------------------------------

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Fail if br-nat IP not found
  assert:
    that:
      - br_nat_ip.stdout | length > 0
    fail_msg: >
      Unable to discover br-nat IP for {{ inventory_hostname }} from KVM.

# ------------------------------------------------------------
# Connect via br-nat
# ------------------------------------------------------------

- name: Use br-nat IP for SSH
  set_fact:
    ansible_host: "{{ br_nat_ip.stdout }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"


- name: Reset SSH connection after IP change
  meta: reset_connection

- name: Wait for SSH via br-nat
  wait_for:
    host: "{{ ansible_host }}"
    port: 22
    timeout: 300
  delegate_to: localhost


# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------

- name: Ensure state directory exists
  raw: |
    powershell -Command "New-Item -ItemType Directory -Force {{ windows_state_dir }}"
  

# ------------------------------------------------------------
# Configure br-cluster NIC with provider_ip
# ------------------------------------------------------------

- name: Configure br-cluster NIC with provider_ip
  raw: |
    powershell -Command "
      $providerIp = '{{ provision_ip }}'

      $clusterNic = Get-NetAdapter |
        Where-Object {
          $ip = Get-NetIPAddress -InterfaceIndex $_.IfIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
                Select-Object -First 1 -ExpandProperty IPAddress
          $ip -and -not $ip.StartsWith('172.')
        } |
        Select-Object -First 1

      if (-not $clusterNic) {
        Write-Error 'Failed to identify br-cluster NIC (non-172 network)'
        exit 1
      }

      # Remove existing IP (DHCP) if present
      Get-NetIPAddress -InterfaceIndex $clusterNic.IfIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
        Remove-NetIPAddress -Confirm:$false

      # Assign provider_ip
      New-NetIPAddress `
        -InterfaceIndex $clusterNic.IfIndex `
        -IPAddress $providerIp `
        -PrefixLength 24
    "
# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------

- name: Set hostname
  shell: |
    powershell -Command "
      if ((hostname) -ne '{{ hostname }}') {
        Rename-Computer -NewName '{{ hostname }}' -Force
      }
    "
  notify: reboot