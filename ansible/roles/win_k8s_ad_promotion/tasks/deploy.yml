# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------

- debug: 
    msg: 
      - "br-nat IP {{ ansible_host }} discovered, connecting to Windows VM for AD promotion tasks"
      - "Provision IP: {{ provision_ip }}, Provision GW: {{ provision_gw }}"
      
- name: Ensure state directory exists
  raw: |
    powershell -Command "New-Item -ItemType Directory -Force {{ windows_state_dir }}"
  

# ------------------------------------------------------------
# Configure br-cluster NIC with provider_ip
# ------------------------------------------------------------

- name: Disable UAC token filtering for remote administrators
  raw: |
    powershell -Command "
      New-ItemProperty `
        -Path 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System' `
        -Name 'LocalAccountTokenFilterPolicy' `
        -PropertyType DWord `
        -Value 1 `
        -Force
    "

- name: Force static IP on br-cluster NIC (netsh – FINAL)
  raw: |
    powershell -Command "
      $ip = '{{ provision_ip }}'

      # Identify second NIC explicitly
      $nicName = 'Ethernet 2'

      # Force static IP (no gateway, no DHCP, no policy checks)
      netsh interface ip set address name=`"$nicName`" static $ip 255.255.255.0 {{ provision_gw }} 1

      # Disable DHCP explicitly
      netsh interface ip set dns name=`"$nicName`" static none
    "


- name: Test if changd
  shell: |
    ssh {{ ansible_host }} ipconfig
    
  delegate_to: localhost
  register: ssh_test
- debug:
    var: ssh_test

# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------

- name: Set hostname
  raw: |
    powershell -Command "
      if ((hostname) -ne '{{ hostname }}') {
        Rename-Computer -NewName '{{ hostname }}' -Force
      }
    "
  notify: reboot
