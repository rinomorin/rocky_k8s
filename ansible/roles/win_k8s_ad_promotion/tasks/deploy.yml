# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------

- debug: 
    msg: 
      - "br-nat IP {{ ansible_host }} discovered, connecting to Windows VM for AD promotion tasks"
      - "Provision IP: {{ provision_ip }}, Provision GW: {{ provision_gw }}"
      
- name: Ensure state directory exists
  raw: |
    powershell -Command "New-Item -ItemType Directory -Force {{ windows_state_dir }}"
  
- name: get Nic to target
  shell: |
    powershell -Command "
      $nic = Get-NetAdapter | Where-Object {
        $ip = (Get-NetIPAddress -InterfaceIndex $_.IfIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
               Select-Object -First 1 -ExpandProperty IPAddress)
        $ip -and -not $ip.StartsWith('172.')
      } | Select-Object -First 1

      if (-not $nic) {
        Write-Error 'Unable to identify br-cluster NIC'
        exit 1
      }

     echo $nic.Name
    "

- name: set fact for nic
  set_fact:
    br_cluster_nic: "{{ get_nic_to_target.stdout }}"
# ------------------------------------------------------------
# Configure br-cluster NIC with provider_ip
# ------------------------------------------------------------
- name: Force static IP on br-cluster NIC (validated manual sequence)
  raw: |
    powershell -Command "
      $ip = '{{ provision_ip }}'
      $gw = '{{ provision_gw }}'
      
      # Identify br-cluster NIC (not 172.x)
      $nic = {{ br_cluster_nic }}

      # Ensure adapter is enabled
      Enable-NetAdapter -Name $nic -Confirm:$false

      # Disable DHCP (adapter must exist)
      Set-NetIPInterface -InterfaceAlias $nic -Dhcp Disabled

      # Remove any existing IPv4 addresses
      Get-NetIPAddress -InterfaceAlias $nic -AddressFamily IPv4 -ErrorAction SilentlyContinue |
        Remove-NetIPAddress -Confirm:$false

      # Assign static IP with gateway
      New-NetIPAddress `
        -InterfaceAlias $nic `
        -IPAddress $ip `
        -PrefixLength 24 `
        -DefaultGateway $gw
    "
- name: Test if changd
  shell: |
    ssh {{ ansible_host }} ipconfig
    
  delegate_to: localhost
  register: ssh_test
- debug:
    var: ssh_test

# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------

- name: Set hostname
  raw: |
    powershell -Command "
      if ((hostname) -ne '{{ hostname }}') {
        Rename-Computer -NewName '{{ hostname }}' -Force
      }
    "
  notify: reboot
