# roles/rocky_k8s/tasks/deploy.yml

- name: Fail if immutable commit command is missing
  assert:
    that:
      - windows_commit_cmd | length > 0
    fail_msg: >
      windows_commit_cmd is not defined.
      This system uses an immutable disk and WILL lose changes on reboot.

# ------------------------------------------------------------
# Discover maintenance NIC (br-nat) IP via KVM
# ------------------------------------------------------------

- name: Discover br-nat IP from KVM
  delegate_to: "{{ kvm_ip }}"
  become: yes
  vars:
    ansible_user: "{{ hostvars[groups['kvm'][0]]['ansible_user'] }}"
  shell: |
    # Get MAC for the specific bridge
    M_MAC=$(virsh domiflist {{ inventory_hostname.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    
    # Loop until the lease appears
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do 
      sleep 5
    done
    
    # Return just the IP
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: br_nat_ip
  changed_when: false

- name: Fail if br-nat IP not found
  assert:
    that:
      - br_nat_ip.stdout | length > 0
    fail_msg: >
      Unable to discover br-nat IP for {{ inventory_hostname }} from KVM.

# ------------------------------------------------------------
# Connect via br-nat
# ------------------------------------------------------------

- name: Use br-nat IP for SSH
  set_fact:
    ansible_host: "{{ br_nat_ip.stdout }}"
    provision_ip: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'] }}"
    provision_gw: "{{ hostvars[inventory_hostname.split('.')[0]]['provision_ip'].split('.')[0:3] | join('.') }}.1"

# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------
      
- name: Ensure state directory exists
  raw: |
    powershell -Command "New-Item -ItemType Directory -Force {{ windows_state_dir }}"
  
# - name: Ensure state directory exists
#   win_shell: New-Item -ItemType Directory -Force "example_state_dir"
  # Replace "example_state_dir" with your {{ windows_state_dir }} variable

- name: Discover br-cluster NIC alias
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "$n=(Get-NetAdapter|?{(Get-NetIPAddress -InterfaceIndex $_.InterfaceIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue).IPAddress -notlike '172.*'})[0]; if($n){Write-Host \"###$($n.Name)###\"}else{exit 1}"
  register: cluster_nic
  changed_when: false

- name: Set fact for nic
  set_fact:
    br_cluster_nic: "{{ cluster_nic.stdout | regex_findall('###(.*?)###') | first | trim }}"

# ------------------------------------------------------------
# Configure br-cluster NIC with provider_ip
# ------------------------------------------------------------
- name: Enable br-cluster NIC
  raw: powershell.exe -NoProfile -NonInteractive -Command "Enable-NetAdapter -Name '{{ br_cluster_nic }}' -Confirm:$false"

- name: Total Purge and Re-provision IPv4
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "Set-NetIPInterface -InterfaceAlias '{{ br_cluster_nic }}' -AddressFamily IPv4 -Dhcp Disabled; Get-NetIPAddress -InterfaceAlias '{{ br_cluster_nic }}' -AddressFamily IPv4 | Remove-NetIPAddress -Confirm:$false; New-NetIPAddress -InterfaceAlias '{{ br_cluster_nic }}' -IPAddress {{ provision_ip }} -PrefixLength 24 -SkipAsSource $false; Set-NetIPInterface -InterfaceAlias '{{ br_cluster_nic }}' -AddressFamily IPv4 -DadTransmits 0 -RouterDiscovery Disabled"
  register: ip_config_result
  
- name: Restart NIC to apply changes
  raw: powershell.exe -NoProfile -NonInteractive -Command "Restart-NetAdapter -Name '{{ br_cluster_nic }}'"

- name: Verify Address State
  raw: powershell.exe -NoProfile -NonInteractive -Command "Get-NetIPAddress -InterfaceAlias '{{ br_cluster_nic }}' -AddressFamily IPv4 | Select-Object IPAddress, AddressState"

# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------
- name: get current hostname
  raw: powershell.exe -NoProfile -NonInteractive -Command "hostname"
  register: current_hostname
  changed_when: false

- name: Set hostname
  raw: |
    powershell -Command "
      if ((hostname) -ne '{{ hostname }}') {
        Rename-Computer -NewName '{{ hostname }}' -Force
      }
    "
  when: current_hostname.stdout != hostname
  # notify: reboot

- name: Flush disk buffers (Windows Sync)
  become: yes
  become_method: runas
  failed_when: false
  register: sync_result
  changed_when: sync_result.rc == 0
  raw: |
    powershell.exe -NoProfile -NonInteractive -Command "Write-VolumeCache -DriveLetter C; fsutil volume dismount C:"
  ignore_errors: yes

- name: Force native reboot
  ansible.windows.win_reboot:
    msg: "Rebooting after hostname change"
    reboot_timeout: 900
  become: yes
  become_method: runas
  when: current_hostname.stdout != hostname