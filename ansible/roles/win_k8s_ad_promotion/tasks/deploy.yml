# ------------------------------------------------------------
# Prepare state directory
# ------------------------------------------------------------

- debug: 
    msg: "br-nat IP {{ ansible_host }} discovered, connecting to Windows VM for AD promotion tasks"
- name: Ensure state directory exists
  raw: |
    powershell -Command "New-Item -ItemType Directory -Force {{ windows_state_dir }}"
  

# ------------------------------------------------------------
# Configure br-cluster NIC with provider_ip
# ------------------------------------------------------------

- name: Configure br-cluster NIC as true static
  raw: |
    powershell -Command "
      $providerIp = '{{ provision_ip }}'

      # Identify br-cluster NIC (not 172.x)
      $nic = Get-NetAdapter | Where-Object {
        $ip = (Get-NetIPAddress -InterfaceIndex $_.IfIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
               Select-Object -First 1 -ExpandProperty IPAddress)
        $ip -and -not $ip.StartsWith('172.')
      } | Select-Object -First 1

      if (-not $nic) {
        Write-Error 'Unable to identify br-cluster NIC'
        exit 1
      }

      # 1. Disable DHCP (CRITICAL)
      Set-NetIPInterface -InterfaceIndex $nic.IfIndex -AddressFamily IPv4 -Dhcp Disabled

      # 2. Disable APIPA / IPv4 autoconfig (CRITICAL)
      netsh interface ipv4 set interface $nic.IfIndex apipa=no

      # 3. Remove all existing IPv4 addresses
      Get-NetIPAddress -InterfaceIndex $nic.IfIndex -AddressFamily IPv4 -ErrorAction SilentlyContinue |
        Remove-NetIPAddress -Confirm:$false

      # 4. Assign static IP
      New-NetIPAddress `
        -InterfaceIndex $nic.IfIndex `
        -IPAddress $providerIp `
        -PrefixLength 24
    "
# ------------------------------------------------------------
# Set hostname (requires reboot)
# ------------------------------------------------------------

- name: Set hostname
  raw: |
    powershell -Command "
      if ((hostname) -ne '{{ hostname }}') {
        Rename-Computer -NewName '{{ hostname }}' -Force
      }
    "
  notify: reboot
