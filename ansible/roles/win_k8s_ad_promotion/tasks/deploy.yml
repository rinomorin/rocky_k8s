  shell: |
    virsh destroy "{{ inventory_hostname.split('.')[0] }}"
  register: stop_res
  failed_when: 
    - stop_res.rc != 0 
    - "'domain is not running' not in start_res.stderr"
  changed_when: 
    - stop_res.rc == 0

- name: Give the OS a moment to breathe
