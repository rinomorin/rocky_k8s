---
- name: 1.1 - Compile Dynamic Jinja2 Manifest into YAML file
  ansible.builtin.template:
    src: dex-and-portainer.yaml.j2
    dest: "{{ role_path }}/files/compiled_dex_and_portainer.yaml"
    mode: '0644'

- name: 1.2 - Run Kubectl Apply via Shell Engine
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl apply -f {{ role_path }}/files/compiled_dex_and_portainer.yaml
  args:
    executable: /bin/bash
  register: kubectl_output

- name: 1.3 - Force Restart Dex to ensure RBAC binds
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl rollout restart deployment/dex -n kube-system
  args:
    executable: /bin/bash
  when: "'configured' in kubectl_output.stdout or 'created' in kubectl_output.stdout"

- name: 1.4 - Output Manifest Applied Results
  ansible.builtin.debug:
    var: kubectl_output.stdout_lines

# ... [Keep your existing task 1.1 through 1.4 manifests exactly as they are] ..
- name: 1.5 - Dynamically Register Wildcard DNS Record inside FreeIPA Directory
  delegate_to: ipa01
  vars:
    ansible_user: "core"
    # Uses your literal directory manager lookup variable from your defaults
    ipa_password: "{{ ad_bind_password }}"
  ansible.builtin.shell: |
    # 1. Obtain a valid administrative Kerberos ticket using your variables
    echo "{{ ipa_password }}" | kinit admin@{{ lookup('env', 'ipa_domain') |upper }}
    
    # 2. Add the dynamic wildcard A record to your cloud zone mapping via your variables
    ipa dnsrecord-add {{ c_zone }} * --a-rec={{ k8s_api_vip }} || true
  args:
    executable: /bin/bash
  changed_when: true

- name: 1.6a - Wait for Portainer Deployment Rollout
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl rollout status deployment/portainer -n portainer --timeout=120s
  args:
    executable: /bin/bash
  register: portainer_rollout
  failed_when: portainer_rollout.rc != 0
  changed_when: false

- name: 1.6b - Wait for Portainer Service Endpoints to populate
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl get endpoints portainer -n portainer -o jsonpath='{.subsets}' || true
  args:
    executable: /bin/bash
  register: portainer_endpoints
  until: portainer_endpoints.stdout is defined and portainer_endpoints.stdout != '' and portainer_endpoints.stdout != 'null'
  retries: 12
  delay: 10
  changed_when: false

- name: 1.6c - Run Automated End-to-End Ingress Connectivity Verification
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    curl -sk -o /dev/null -w "%{http_code}" https://portainer.api.{{ c_zone }}/
  args:
    executable: /bin/bash
  register: ingress_test_status
  until: ingress_test_status.stdout == "200"
  retries: 6
  delay: 10
  changed_when: false
