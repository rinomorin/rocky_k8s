---
- name: 1.1 - Compile Dynamic Jinja2 Manifest into YAML file
  ansible.builtin.template:
    src: dex-and-portainer.yaml.j2
    dest: "{{ role_path }}/files/compiled_dex_and_portainer.yaml"
    mode: '0644'

- name: 1.2 - Run Kubectl Apply via Shell Engine
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl apply -f {{ role_path }}/files/compiled_dex_and_portainer.yaml
  args:
    executable: /bin/bash
  register: kubectl_output

- name: 1.3 - Force Restart Dex to ensure RBAC binds
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl rollout restart deployment/dex -n kube-system
  args:
    executable: /bin/bash
  when: "'configured' in kubectl_output.stdout or 'created' in kubectl_output.stdout"

- name: 1.4 - Output Manifest Applied Results
  ansible.builtin.debug:
    var: kubectl_output.stdout_lines
