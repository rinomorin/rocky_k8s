---
# --- PRE-FLIGHT STORAGE ENFORCEMENT ENGINE ---
- name: "0.1 - Target Primary Storage Controller to Apply Verified Export Schema"
  delegate_to: "{{ groups['nfs_storage_nodes'] | first }}"
  vars:
    ansible_user: "core"
  ansible.builtin.shell: "sudo ceph nfs export apply SharedStorage -i -"
  args:
    stdin: |
      {
        "export_id": 1,
        "path": "/",
        "pseudo": "/sharedstorage",
        "access_type": "RW",
        "squash": "none",
        "protocols": [4],
        "transports": ["TCP"],
        "fsal": {
          "name": "CEPH",
          "user_id": "nfs.SharedStorage.1",
          "fs_name": "cephfs"
        }
      }
  changed_when: true

- name: "0.2 - Confirm Storage Node Export Path is Active and Operational"
  delegate_to: "{{ groups['nfs_storage_nodes'] | first }}"
  vars:
    ansible_user: "core"
  ansible.builtin.shell: "sudo ceph nfs export get SharedStorage /sharedstorage --format json | jq -r '.access_type'"
  register: live_export_status
  until: live_export_status.rc == 0 and live_export_status.stdout | trim == 'RW'
  retries: 6
  delay: 5
  changed_when: false

# --- EXISTING MANIFEST LIFECYCLE ROUTINES ---
- name: 1.1 - Compile Dynamic Jinja2 Manifest into YAML file
  ansible.builtin.template:
    src: dex-and-portainer.yaml.j2
    dest: "{{ role_path }}/files/compiled_dex_and_portainer.yaml"
    mode: '0644'

- name: 1.2 - Run Kubectl Apply via Shell Engine
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl apply -f {{ role_path }}/files/compiled_dex_and_portainer.yaml
  args:
    executable: /bin/bash
  register: kubectl_output

- name: 1.3 - Force Restart Dex to ensure RBAC binds
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl rollout restart deployment/dex -n kube-system
  args:
    executable: /bin/bash
  when: "'configured' in kubectl_output.stdout or 'created' in kubectl_output.stdout"

- name: 1.4 - Output Manifest Applied Results
  ansible.builtin.debug:
    var: kubectl_output.stdout_lines

- name: 1.5 - Dynamically Register Wildcard DNS Record inside FreeIPA Directory
  delegate_to: ipa01
  vars:
    ansible_user: "core"
    ipa_password: "{{ ad_bind_password }}"
  ansible.builtin.shell: |
    echo "{{ ipa_password }}" | kinit admin@{{ lookup('env', 'ipa_domain') | upper }}
    ipa dnsrecord-add {{ c_zone }} * --a-rec={{ k8s_api_vip }} || true
  args:
    executable: /bin/bash
  changed_when: true

- name: 1.6a - Wait for Portainer Deployment Rollout
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl rollout status deployment/portainer -n portainer --timeout=120s
  args:
    executable: /bin/bash
  register: portainer_rollout
  failed_when: false
  changed_when: false

- name: 1.6a.1 - Capture rollout failure status
  ansible.builtin.set_fact:
    portainer_rollout_failed: "{{ portainer_rollout.rc != 0 }}"
  changed_when: false

- name: 1.6a.debug - Show Portainer PVC status on rollout failure
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl get pvc -n portainer
  args:
    executable: /bin/bash
  register: portainer_pvc_status
  changed_when: false
  when: portainer_rollout_failed

- name: 1.6a.debug - Print Portainer PVC status
  ansible.builtin.debug:
    var: portainer_pvc_status.stdout_lines
  when: portainer_rollout_failed

- name: 1.6a.debug - Describe Portainer pod on rollout failure
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: |
    POD=$(kubectl get pods -n portainer -o jsonpath='{.items[0].metadata.name}')
    if [ -n "$POD" ]; then
      kubectl describe pod -n portainer "$POD"
    else
      echo "No Portainer pod found to describe"
    fi
  args:
    executable: /bin/bash
  register: portainer_pod_description
  changed_when: false
  when: portainer_rollout_failed

- name: 1.6a.debug - Print Portainer pod description output
  ansible.builtin.debug:
    var: portainer_pod_description.stdout_lines
  when: portainer_rollout_failed

- name: 1.6a.debug - Dump init container logs for Portainer on rollout failure
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: |
    POD=$(kubectl get pods -n portainer -o jsonpath='{.items[0].metadata.name}')
    if [ -n "$POD" ]; then
      kubectl logs -n portainer "$POD" -c volume-permissions-fix || true
    else
      echo "No Portainer pod found for init container logs"
    fi
  args:
    executable: /bin/bash
  register: portainer_init_logs
  changed_when: false
  when: portainer_rollout_failed

- name: 1.6a.debug - Print Portainer init log output
  ansible.builtin.debug:
    var: portainer_init_logs.stdout_lines
  when: portainer_rollout_failed

- name: 1.6a.debug - Dump main Portainer container logs on rollout failure
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: |
    POD=$(kubectl get pods -n portainer -o jsonpath='{.items[0].metadata.name}')
    if [ -n "$POD" ]; then
      kubectl logs -n portainer "$POD" -c portainer || true
    else
      echo "No Portainer pod found for main container logs"
    fi
  args:
    executable: /bin/bash
  register: portainer_main_logs
  changed_when: false
  when: portainer_rollout_failed

- name: 1.6a.debug - Print Portainer main log output
  ansible.builtin.debug:
    var: portainer_main_logs.stdout_lines
  when: portainer_rollout_failed

- name: 1.6a.fail if Portainer rollout still failed
  ansible.builtin.fail:
    msg: "Portainer rollout timed out. Check Kubernetes diagnostics above."
  when: portainer_rollout_failed

- name: 1.6b - Wait for Portainer Service Endpoints to populate
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    kubectl get endpoints portainer -n portainer -o jsonpath='{.subsets}' || true
  args:
    executable: /bin/bash
  register: portainer_endpoints
  until: portainer_endpoints.stdout is defined and portainer_endpoints.stdout != '' and portainer_endpoints.stdout != 'null'
  retries: 12
  delay: 10
  changed_when: false
  when: not portainer_rollout_failed | default(false)

- name: 1.6c - Run Automated End-to-End Ingress Connectivity Verification
  environment:
    KUBECONFIG: "/home/{{ lookup('env', 'USER') }}/.kube/config"
  ansible.builtin.shell: >
    curl -sk -o /dev/null -w "%{http_code}" https://portainer.api.{{ c_zone }}/
  args:
    executable: /bin/bash
  register: ingress_test_status
  until: ingress_test_status.stdout == "200"
  retries: 6
  delay: 10
  changed_when: false
  when: not portainer_rollout_failed | default(false)