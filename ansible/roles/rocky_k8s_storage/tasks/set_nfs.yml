---
# This file is evaluated sequentially for each node using 'nfs_node'

- name: "Execute Local Node Profile System Tasks on {{ nfs_node }}"
  delegate_to: "{{ nfs_node }}"
  vars:
    ansible_user: "{{ hostevars[nfs_node]['ansible_user'] | default('core') }}"
  block:
    - name: Set Resolv.conf to Use our dns
      ansible.builtin.shell: |
        sudo tee /etc/resolv.conf << 'EOF'
        search {{ p_zone }} {{ c_zone }} {{ b_zone }}
        nameserver {{ hostvars[groups['helpers'] | first]['provision_ip'] }}
        nameserver {{ hostvars[groups['ipa'] | first]['ansible_host'] }}
        EOF

    - name: "1.4 - Enable Ceph Quincy Repo and Install Software Baseline"
      ansible.builtin.shell: |
        sudo dnf install -y centos-release-ceph-quincy
        sudo dnf install -y cephadm podman ceph-common jq
      changed_when: false

    - name: "1.4.3 - Open Core Networking Ports on Public Zone"
      ansible.builtin.shell: |
        sudo firewall-cmd --zone=public --add-port=9283/tcp --permanent
        sudo firewall-cmd --zone=public --add-port=8765/tcp --permanent
        sudo firewall-cmd --zone=public --add-port=8443/tcp --permanent
        sudo firewall-cmd --reload
      changed_when: false

    - name: "1.4.5 - Hard-Reset Root Access Parameters for Cephadm Mesh"
      ansible.builtin.shell: |
        mkdir -p /etc/ssh/sshd_config.d
        echo "PermitRootLogin yes" > /etc/ssh/sshd_config.d/00-cephadm-override.conf
        echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config.d/00-cephadm-override.conf
        sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        echo "root:CephBootstrap2026!" | chpasswd
        usermod -U root
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh
        if [ -f /home/core/.ssh/authorized_keys ]; then
          cp /home/core/.ssh/authorized_keys /root/.ssh/authorized_keys
        else
          touch /root/.ssh/authorized_keys
        fi
        chmod 600 /root/.ssh/authorized_keys
        restorecon -R -v /root/.ssh
        setsebool -P container_manage_cgroup true || true
        setsebool -P container_connect_any true || true
        systemctl restart sshd
      changed_when: false

    - name: "1.5 - Bootstrap Primary Ceph Cluster Controller"
      ansible.builtin.shell: |
        sudo cephadm bootstrap \
          --mon-ip {{ ceph_primary_ip }} \
          --cluster-network {{ ceph_cluster_network }} \
          --skip-dashboard \
          --allow-fqdn-hostname \
          --ssh-user root
      register: bootstrap_out
      when: nfs_node == ceph_primary_node


- name: "Execute Consolidated Cluster Mesh Coordination Tasks"
  delegate_to: "{{ ceph_primary_node }}"
  vars:
    ansible_user: "{{ hostvars[ceph_primary_node]['ansible_user'] | default('core') }}"
  block:
    - name: "1.6b - Live Query Primary SSH Public Key"
      ansible.builtin.shell: "sudo cat /etc/ceph/ceph.pub"
      register: live_mesh_key

    - name: "1.7 - Distribute Authorized Root Mesh Keys across Infrastructure Map"
      ansible.builtin.shell: |
        sudo mkdir -p /root/.ssh
        echo "{{ live_mesh_key.stdout }}" | sudo tee -a /root/.ssh/authorized_keys
        sudo chmod 600 /root/.ssh/authorized_keys
      delegate_to: "{{ item }}"
      loop: "{{ groups['nfs_storage_nodes'] }}"
      when: item != ceph_primary_node
      changed_when: false

    - name: "1.8 - Expand Ceph Mesh and Inject Node Admin Access Controls"
      ansible.builtin.shell: |
        sudo ceph orch host add {{ item }} {{ hostvars[item]['provision_ip'] }} --labels _admin
      loop: "{{ groups['nfs_storage_nodes'] }}"
      when: item != ceph_primary_node
      changed_when: true

    - name: "1.8c - Verify All Nodes Exist in Orchestrator Quorum"
      ansible.builtin.shell: "sudo ceph orch host ls --format json | jq '. | length'"
      register: current_host_count
      until: current_host_count.stdout | int == (groups['nfs_storage_nodes'] | length)
      retries: 25
      delay: 15
      changed_when: false

    - name: "1.9 - Automatically Consume Raw Secondary Disks (/dev/vda) into Pool"
      ansible.builtin.shell: "sudo ceph orch apply osd --all-available-devices"
      changed_when: true

    - name: "1.9b - Wait for Active Storage OSDs to complete Replication Factor Provisioning"
      ansible.builtin.shell: "sudo ceph osd stat --format json | jq '.num_osds'"
      register: pool_osd_count
      until: pool_osd_count.stdout | int >= (groups['nfs_storage_nodes'] | length)
      retries: 55
      delay: 20
      changed_when: false

    # --- NEW CRITICAL BLOCK: PROVISION CEPHFS STORAGE CHANNELS ---
    - name: "1.9c - Create Dedicated CephFS Metadata Pool"
      ansible.builtin.shell: "sudo ceph osd pool create cephfs_metadata 16 16"
      changed_when: true

    - name: "1.9d - Create Dedicated CephFS Data Pool"
      ansible.builtin.shell: "sudo ceph osd pool create cephfs_data 32 32"
      changed_when: true

    - name: "1.9e - Enable and Build CephFS File System Volume Architecture"
      ansible.builtin.shell: "sudo ceph fs new cephfs cephfs_metadata cephfs_data"
      changed_when: true

    - name: "2.0 - Deploy Active-Active NFS-Ganesha Cluster Exports Layer"
      ansible.builtin.shell: |
        sudo ceph orch apply nfs SharedStorage Pool1 --placement="{{ groups['nfs_storage_nodes'] | length }} {{ groups['nfs_storage_nodes'] | join(' ') }}"
      changed_when: true

    # --- FIXED EXPORT ROUTINE PASSING CORRECT PROPERTY ARRAYS ---
    - name: "2.1 - Force Apply Read-Write (RW) Permissions to Ceph NFS Export"
      delegate_to: localhost
      run_once: true
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null core@{{ hostvars[nfs_node]['provision_ip'] }} "sudo ceph nfs export apply SharedStorage -i -" <<'EOF'
        {
          "export_id": 1,
          "path": "/",
          "pseudo": "/sharedstorage",
          "access_type": "RW",
          "squash": "none",
          "protocols": [4],
          "transports": ["TCP"],
          "fsal": {
            "name": "CEPH",
            "user_id": "nfs.SharedStorage.1",
            "fs_name": "cephfs"
          }
        }
        EOF
      changed_when: true
      register: nfs_export_apply
      failed_when: nfs_export_apply.rc != 0

    # --- FIXED VERIFICATION TASK TARGETING EXPORT ID ---
    - name: "2.1b - Verify Ceph NFS Export is RW and Active"
      ansible.builtin.shell: |
        set -o pipefail

        # Try known-working commands in order; echo access_type when found
        # 1) query by pseudo path
        sudo ceph nfs export get SharedStorage /sharedstorage --format json 2>/tmp/ceph_nfs_get_err || true | jq -r '.access_type' 2>/dev/null | sed -n '1p' && exit 0

        # 2) query by export id
        sudo ceph nfs export get SharedStorage 1 --format json 2>>/tmp/ceph_nfs_get_err || true | jq -r '.access_type' 2>/dev/null | sed -n '1p' && exit 0

        # 3) fallback to listing and selecting export_id 1
        sudo ceph nfs export ls SharedStorage --format json 2>>/tmp/ceph_nfs_get_err || true | jq -r '.[] | select(.export_id==1) | .access_type' 2>/dev/null | sed -n '1p' && exit 0

        # If we reach here, collect debug info and fail
        echo "DEBUG: no export JSON returned from any command" >&2
        echo "--- ceph_nfs_get_err (stderr from attempts) ---" >&2
        sed -n '1,200p' /tmp/ceph_nfs_get_err >&2 || true
        exit 1
      register: export_access_type
      retries: 6
      delay: 10
      until: export_access_type.rc == 0 and export_access_type.stdout is defined and export_access_type.stdout | trim == 'RW'
      changed_when: false
      failed_when: export_access_type.rc != 0 or export_access_type.stdout is not defined or export_access_type.stdout | trim != 'RW'

  # Forces this master orchestration block to run exactly ONCE on the final loop pass
  when: nfs_node == groups['nfs_storage_nodes'][-1]