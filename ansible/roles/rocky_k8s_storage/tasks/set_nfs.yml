---
# This file is evaluated sequentially for each node using 'nfs_node'

- name: "Execute Local Configuration Block on {{ nfs_node }}"
  delegate_to: "{{ nfs_node }}"
  vars:
    ansible_user: "{{ hostvars[nfs_node]['ansible_user'] | default('core') }}"
  block:
    - name: "1.4 - Enable Ceph Repo and Install Tooling"
      ansible.builtin.shell: |
        # 1. Install the release definition (using Quincy for maximum stability on EL9)
        sudo dnf install -y centos-release-ceph-quincy
        # 2. Install the actual orchestrator and container tools
        sudo dnf install -y cephadm podman ceph-common
      register: ceph_install_result
      changed_when: "'Installing' in ceph_install_result.stdout"

    - name: "1.4.3 - open firewall for nfs"
      become: yes
      ansible.builtin.shell: |
        sudo firewall-cmd --zone=public --add-port=9283/tcp
        sudo firewall-cmd --zone=public --add-port=8765/tcp
        sudo firewall-cmd --zone=public --add-port=8443/tcp
        sudo firewall-cmd --reload
      when: nfs_node == ceph_primary_node

    - name: "1.4.5 - Hard-Reset Root SSH for Cephadm"
      become: yes
      ansible.builtin.shell: |
        mkdir -p /etc/ssh/sshd_config.d
        echo "PermitRootLogin yes" > /etc/ssh/sshd_config.d/00-cephadm-override.conf
        echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config.d/00-cephadm-override.conf
        
        sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        
        echo "root:CephBootstrap2026!" | chpasswd
        usermod -U root
        
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh
        if [ -f /home/core/.ssh/authorized_keys ]; then
          cp /home/core/.ssh/authorized_keys /root/.ssh/authorized_keys
        else
          touch /root/.ssh/authorized_keys
        fi
        chmod 600 /root/.ssh/authorized_keys
        
        # Correct security parameters and force complete service restart
        restorecon -R -v /root/.ssh
        setsebool -P container_manage_cgroup true || true
        setsebool -P container_connect_any true || true
        
        systemctl restart sshd
    
    - name: "1.5 - Bootstrap Primary Ceph Node Dynamically"
      become: yes
      ansible.builtin.shell: |
        cephadm bootstrap \
          --mon-ip {{ ceph_primary_ip }} \
          --cluster-network {{ ceph_cluster_network }} \
          --skip-dashboard \
          --allow-fqdn-hostname \
          --ssh-user root
      register: bootstrap_out
      when: nfs_node == ceph_primary_node    

    - name: "1.5.1 - Manual Key Injection (Fix for Auth Failed)"
      ansible.builtin.shell: |
        if [ -f /etc/ceph/ceph.pub ]; then
          cat /etc/ceph/ceph.pub >> /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
        fi
      when: nfs_node == ceph_primary_node

    - name: "1.6 - Fetch Ceph Cluster Public SSH Key"
      become: yes
      ansible.builtin.shell: "cat /etc/ceph/ceph.pub"
      register: ceph_pub_key
      when: nfs_node == ceph_primary_node

- name: "Execute Ceph Cluster Mesh Coordination Tasks"
  vars:
    ansible_user: "{{ hostvars[ceph_primary_node]['ansible_user'] | default('core') }}"
  block:
    - name: "1.7 - Distribute Cluster Keys to Secondary Storage Nodes via Maintenance Map"
      delegate_to: "localhost"
      become: false
      ansible.builtin.shell: |
        # 1. Reach back out to the primary node dynamically to get the real-time public key
        PRIMARY_M_IP="{{ maintenance_map[ceph_primary_node] }}"
        CEPH_KEY=\$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa core@\${PRIMARY_M_IP} "sudo cat /etc/ceph/ceph.pub")
        
        # 2. Append that key to the current loop target
        TARGET_M_IP="{{ maintenance_map[item] }}"
        ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa core@\${TARGET_M_IP} "sudo mkdir -p /root/.ssh && echo \"\${CEPH_KEY}\" | sudo tee -a /root/.ssh/authorized_keys && sudo chmod 600 /root/.ssh/authorized_keys"
      loop: "{{ groups['nfs_storage_nodes'] }}"
      # Skip the primary node since it already has its own loopback key
      when: item != ceph_primary_node

    - name: "1.8 - Expand Ceph Mesh and Add Storage Nodes to Orchestrator"
      delegate_to: "{{ ceph_primary_node }}"
      become: yes
      ansible.builtin.shell: |
        ceph orch host add {{ item }} {{ hostvars[item]['provision_ip'] }}
      loop: "{{ groups['nfs_storage_nodes'] }}"
      register: host_add_out
      until: host_add_out.rc == 0
      retries: 5
      delay: 10
      when: item != ceph_primary_node

    - name: "1.9 - Automatically Consume Raw Secondary Disks (/dev/vdb) into OSD Pool"
      delegate_to: "{{ ceph_primary_node }}"
      become: yes
      ansible.builtin.shell: "ceph orch apply osd --all-available-devices"

    - name: "2.0 - Deploy Active-Active NFS-Ganesha Gateways via Ceph Orchestrator"
      delegate_to: "{{ ceph_primary_node }}"
      become: yes
      ansible.builtin.shell: >
        ceph orch apply nfs SharedStorage Pool1 --placement="{{ groups['nfs_storage_nodes'] | length }} {{ groups['nfs_storage_nodes'] | join(' ') }}"

  # Only run this whole orchestration block on the VERY LAST node iteration
  when: nfs_node == groups['nfs_storage_nodes'][-1]