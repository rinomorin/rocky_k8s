---
# This file is evaluated sequentially for each node using 'nfs_node'

- name: "Execute Local Node Profile System Tasks on {{ nfs_node }}"
  delegate_to: "{{ nfs_node }}"
  vars:
    ansible_user: "{{ hostvars[nfs_node]['ansible_user'] | default('core') }}"
  block:
    - name: "1.4 - Enable Ceph Quincy Repo and Install Software Baseline"
      ansible.builtin.shell: |
        sudo dnf install -y centos-release-ceph-quincy
        sudo dnf install -y cephadm podman ceph-common jq
      changed_when: false

    - name: "1.4.3 - Open Core Networking Ports on Public Zone"
      ansible.builtin.shell: |
        sudo firewall-cmd --zone=public --add-port=9283/tcp --permanent
        sudo firewall-cmd --zone=public --add-port=8765/tcp --permanent
        sudo firewall-cmd --zone=public --add-port=8443/tcp --permanent
        sudo firewall-cmd --reload
      changed_when: false

    - name: "1.4.5 - Hard-Reset Root Access Parameters for Cephadm Mesh"
      ansible.builtin.shell: |
        mkdir -p /etc/ssh/sshd_config.d
        echo "PermitRootLogin yes" > /etc/ssh/sshd_config.d/00-cephadm-override.conf
        echo "PubkeyAuthentication yes" >> /etc/ssh/sshd_config.d/00-cephadm-override.conf
        sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
        sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
        echo "root:CephBootstrap2026!" | chpasswd
        usermod -U root
        mkdir -p /root/.ssh
        chmod 700 /root/.ssh
        if [ -f /home/core/.ssh/authorized_keys ]; then
          cp /home/core/.ssh/authorized_keys /root/.ssh/authorized_keys
        else
          touch /root/.ssh/authorized_keys
        fi
        chmod 600 /root/.ssh/authorized_keys
        restorecon -R -v /root/.ssh
        setsebool -P container_manage_cgroup true || true
        setsebool -P container_connect_any true || true
        systemctl restart sshd
      changed_when: false

    - name: "1.5 - Bootstrap Primary Ceph Cluster Controller"
      ansible.builtin.shell: |
        sudo cephadm bootstrap \
          --mon-ip {{ ceph_primary_ip }} \
          --cluster-network {{ ceph_cluster_network }} \
          --skip-dashboard \
          --allow-fqdn-hostname \
          --ssh-user root
      register: bootstrap_out
      when: nfs_node == ceph_primary_node

    # Bypasses the loop-variable loss issue by saving the key safely to disk on the helper machine
    - name: "1.6 - Localize Captured Cluster Public Keys to Controller Scratchpad"
      ansible.builtin.shell: "sudo cat /etc/ceph/ceph.pub"
      register: local_scratch_key
      when: nfs_node == ceph_primary_node


- name: "Execute Consolidated Cluster Mesh Coordination Tasks"
  delegate_to: "{{ ceph_primary_node }}"
  vars:
    ansible_user: "{{ hostvars[ceph_primary_node]['ansible_user'] | default('core') }}"
  block:
    # 1.6b - Evaluates the key cleanly from memory without querying multi-pass loop arrays
    - name: "1.6b - Dynamically Extract Primary SSH Public Key via Live Query"
      ansible.builtin.shell: "sudo cat /etc/ceph/ceph.pub"
      register: live_mesh_key

    - name: "1.7 - Distribute Authorized Root Mesh Keys across Infrastructure Map"
      ansible.builtin.shell: |
        sudo mkdir -p /root/.ssh
        echo "{{ live_mesh_key.stdout }}" | sudo tee -a /root/.ssh/authorized_keys
      delegate_to: "{{ item }}"
      loop: "{{ groups['nfs_storage_nodes'] }}"
      when: item != ceph_primary_node
      changed_when: false

    - name: "1.8 - Expand Ceph Mesh and Inject Node Admin Access Controls"
      ansible.builtin.shell: |
        sudo ceph orch host add {{ item }} {{ hostvars[item]['provision_ip'] }} --labels _admin
      loop: "{{ groups['nfs_storage_nodes'] }}"
      when: item != ceph_primary_node
      changed_when: true

    - name: "1.8c - Verify All Nodes Exist in Orchestrator Quorum"
      ansible.builtin.shell: "sudo ceph orch host ls --format json | jq '. | length'"
      register: current_host_count
      until: current_host_count.stdout | int == (groups['nfs_storage_nodes'] | length)
      retries: 25
      delay: 15
      changed_when: false

    - name: "1.9 - Automatically Consume Raw Secondary Disks (/dev/vdb) into Pool"
      ansible.builtin.shell: "sudo ceph orch apply osd --all-available-devices"
      changed_when: true

    - name: "1.9b - Wait for Active Storage OSDs to complete Replication Factor Provisioning"
      ansible.builtin.shell: "sudo ceph osd stat --format json | jq '.num_osds'"
      register: pool_osd_count
      until: pool_osd_count.stdout | int >= (groups['nfs_storage_nodes'] | length)
      retries: 35
      delay: 20
      changed_when: false

    - name: "2.0 - Deploy Active-Active NFS-Ganesha Cluster Exports Layer"
      ansible.builtin.shell: |
        sudo ceph orch apply nfs SharedStorage Pool1 --placement="{{ groups['nfs_storage_nodes'] | length }} {{ groups['nfs_storage_nodes'] | join(' ') }}"
      changed_when: true

  # Forces this master orchestration block to run exactly ONCE on the final loop pass
  when: nfs_node == groups['nfs_storage_nodes'][-1]
