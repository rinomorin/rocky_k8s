---
# Environment profile variables
build_profile: "{{ BUILD_PROFILE | default(lookup('env', 'BUILD_PROFILE')) | default('k8s', true) }}"
build_date: "{{ lookup('pipe', 'date +%Y%m%d') }}"
build_timestamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M') }}"
build_loops: "{{ BUILD_LOOPS_VAR | default(lookup('env', 'build_loops')) | default(120, true) }}"
tos_variant: "{{ '10' if build_profile == 'infra' else '9' }}"
safe_os_version: "{{ tos_variant | replace('.', 'r') }}"

# Dynamic golden image string matching your spec
golden_image_name: "gi-{{ build_profile }}-{{ safe_os_version }}-{{ build_date }}"

# KVM Hypervisor variables
VM_HOST: "{{ lookup('env', 'VM_HOST') }}"
VM_HOST_IP: "{{ lookup('env', 'VM_HOST_IP') }}"
kvm_host: "{{ groups['kvm'][0]}}"
storage_disk_ceph_size: 80
storage_group_hosts: "{{ groups['nfs_storage_nodes'] | default([]) }}"

# --- NEW CEPH CLUSTER DYNAMIC CORE PARAMS ---
ceph_primary_node: "{{ groups['nfs_storage_nodes'][0] }}"
ceph_primary_ip: "{{ hostvars[groups['nfs_storage_nodes'][0]]['provision_ip'] }}"
ceph_cluster_network: "{{ ceph_primary_ip.split('.')[:3] | join('.') }}.0/24"
ceph_admin_user: "{{ hostvars[groups['nfs_storage_nodes'][0]]['ansible_user'] }}"
