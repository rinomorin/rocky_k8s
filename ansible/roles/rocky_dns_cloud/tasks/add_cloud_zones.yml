---
- name: "Network - Ensure Correct Default Gateway for Ambassador"
  become: yes
  vars:
    safe_helper_ip: "{{ dns_helper_provider_ip }}"
    TGW: "{{ safe_helper_ip.split('.')[:3] | join('.') }}.1"
  ansible.builtin.shell: |
    TARGET_IP="{{ safe_helper_ip }}"
    TARGET_GW="{{ TGW }}"
    NIC_NAME=$(ip -o addr show | grep "$TARGET_IP" | awk '{print $2}' | sed 's/://')
    CURRENT_GW=$(ip route show default | awk '/default/ {print $3}')

    if [ "$CURRENT_GW" != "$TARGET_GW" ]; then
        echo "Gateway mismatch! Current: $CURRENT_GW, Target: $TARGET_GW. Updating..."
        nmcli connection modify "$NIC_NAME" ipv4.gateway "$TARGET_GW" ipv4.method manual
        nmcli connection up "$NIC_NAME"
    else
        echo "Gateway is already correct ($CURRENT_GW). No action needed."
    fi
  register: gw_result
  changed_when: "'Updating...' in gw_result.stdout"

- name: DNS Delegation via IPA CLI
  delegate_to: "{{ ipa_master_host }}"
  block:
    - name: Obtain Kerberos ticket for IPA Admin
      ansible.builtin.shell: echo "{{ ipa_admin_password }}" | kinit admin
      changed_when: false
      no_log: true        

    # STEP 1: Create the Cloud Zone
    - name: Create the cloud sub-zone
      ansible.builtin.shell: |
        ipa dnszone-add "{{ dns_sub_zone }}" --admin-email="admin@{{ dns_primary_zone }}" --force
      register: zone_result
      failed_when: 
        - zone_result.rc != 0 
        - "'already exists' not in zone_result.stderr"
      changed_when: "'added zone' in zone_result.stdout"

    # STEP 2: Add helper A record
    - name: Add A record for helper in the new cloud zone
      ansible.builtin.shell: |
        ipa dnsrecord-add "{{ dns_sub_zone }}" "{{ dns_helper_hostname_short }}" --a-rec="{{ dns_helper_provider_ip }}"
      register: rec_result
      failed_when: 
        - rec_result.rc != 0 
        - "'already exists' not in rec_result.stderr"
        - "'no modifications' not in rec_result.stderr"
      changed_when: "'Added record' in rec_result.stdout"

    # STEP 4: Delegate the sub-zone
    - name: Add NS record to parent zone for delegation
      vars:
        cloud_label: "{{ dns_sub_zone.split('.')[0] }}"
      ansible.builtin.shell: |
        ipa dnsrecord-add "{{ dns_primary_zone }}" "{{ cloud_label }}" --ns-rec="{{ dns_helper_hostname_short }}.{{ dns_sub_zone }}."
      register: ns_result
      failed_when: 
        - ns_result.rc != 0 
        - "'already exists' not in ns_result.stderr"
        - "'no modifications' not in ns_result.stderr"
      changed_when: "'Added record' in ns_result.stdout"

    # STEP 5: Configure the Forwarder
    - name: Configure DNS Forwarder for the cloud zone
      ansible.builtin.shell: |
        ipa dnszone-mod "{{ dns_sub_zone }}" --forwarder="{{ dns_helper_provider_ip }}" --forward-policy=only
      register: fwd_result
      failed_when: 
        - fwd_result.rc != 0 
        - "'no modifications' not in fwd_result.stderr"
      changed_when: "'Modified zone' in fwd_result.stdout"

- name: "DNS - Create Isolated Provisioning Zones"
  delegate_to: "{{ ipa_master_host }}"
  block:
    - name: Create the provision.local isolated zone
      ansible.builtin.shell: |
        ipa dnszone-add "{{ dns_provision_zone }}" --forwarder="{{ dns_helper_provision_ip }}" --forward-policy=only --force
      register: prov_zone_result
      failed_when: 
        - prov_zone_result.rc != 0 
        - "'already exists' not in prov_zone_result.stderr"
        - "'no modifications' not in prov_zone_result.stderr"
      changed_when: "'added zone' in prov_zone_result.stdout"

    - name: Ensure Isolated Reverse Zone exists
      ansible.builtin.shell: |
        ipa dnszone-add "{{ dns_provision_rev_zone }}" --forwarder="{{ dns_helper_provision_ip }}" --forward-policy=only --force
      register: prov_rev_result
      failed_when: 
        - prov_rev_result.rc != 0 
        - "'already exists' not in prov_rev_result.stderr"
        - "'no modifications' not in prov_rev_result.stderr"
      changed_when: "'added zone' in prov_rev_result.stdout"

  always:
    - name: Destroy Kerberos ticket
      ansible.builtin.shell: kdestroy
      changed_when: false