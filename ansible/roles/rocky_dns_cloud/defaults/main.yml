---
# Host and IP Discovery
ipa_master_host: "{{ groups['ipa'][0] }}"
ipa_master_ip: "{{ hostvars[ipa_master_host]['ansible_host'] }}"
ipa_primary_fqdn: "{{ hostvars[ipa_master_host]['hostname'] | default(hostvars[ipa_master_host]['inventory_hostname']) }}"

# Credential Management
ipa_admin_password: "{{ lookup('env', 'IPA_ADMIN_PASSWORD') }}"

# DNS Zone Logic
# Helper Identity
dns_helper_host_key: "{{ groups['helpers'][0]['hostname'] }}"

# Extracts 'home.morinsoft.ca'
dns_primary_zone: "{{ ipa_primary_fqdn.split('.')[1:] | join('.') }}"

# Extracts 'cloud.home.morinsoft.ca' (Fixed trailing braces)
dns_sub_zone: "{{ dns_helper_host_key.split('.')[1:] | join('.') }}"
# Fixed trailing braces
dns_helper_zone: "{{ dns_helper_host_key.split('.')[1:] | join('.') }}"
dns_helper_hostname: "{{ hostvars[dns_helper_host_key]['hostname'] }}"
dns_helper_hostname_short: "{{ hostvars[dns_helper_host_key]['hostname'].split('.')[0] }}"
dns_helper_provider_ip: "{{ hostvars[dns_helper_host_key]['provider_ip'] }}"
dns_helper_provision_ip: "{{ hostvars[dns_helper_host_key]['provision_ip'] }}"

# Reverse DNS Logic
dns_reverse_zone: "{{ dns_helper_provider_ip.split('.')[:3] | reverse | join('.') }}.in-addr.arpa."
dns_provision_rev_zone: "{{ dns_helper_provision_ip.split('.')[:3] | reverse | join('.') }}.in-addr.arpa."
# Note: Ensure dns_helper_ip is defined or use dns_helper_provider_ip here
dns_helper_ptr: "{{ dns_helper_provider_ip.split('.')[-1] }}"