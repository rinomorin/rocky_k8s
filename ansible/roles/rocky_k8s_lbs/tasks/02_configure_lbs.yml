# 02_configure_lbs.yml 
---
- name: "DNS Prep - clean resolve"
  delegate_to: localhost
  become: false
  ansible.builtin.shell: |     
    ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null core@{{ hostvars[item]['provider_ip'] }} "
      sudo sed -i '/nameserver 172.16/d' /etc/resolv.conf && \
      echo 'search {{ c_zone }} {{ p_zone }} {{ c_zone.replace(c_zone.split('.')[-1], 'local') }}' | sudo tee /etc/resolv.conf > /dev/null && \
      echo 'nameserver {{ hostvars[groups['helpers'][0]]['provider_ip'] }}' | sudo tee -a /etc/resolv.conf > /dev/null && \
      echo 'nameserver {{ hostvars[groups['ipa'][0]]['ansible_host'] }}' | sudo tee -a /etc/resolv.conf > /dev/null && \
      echo 'nameserver {{ hostvars[groups['ipa'][1]]['ansible_host'] }}' | sudo tee -a /etc/resolv.conf > /dev/null"
  loop: "{{ groups['hahost'] }}"

- name: Install HA Software Stack
  delegate_to: localhost
  become: false
  shell: |
    ssh core@{{ hostvars[item]['provider_ip'] }} "sudo dnf install -y haproxy keepalived policycoreutils-python-utils"
  loop: "{{ groups['hahost'] }}"

- name: Configure Load Balancer Infrastructure
  block:
    - name: Create local staging directories
      delegate_to: localhost
      file:
        path: "/tmp/k8s_lb_configs/{{ item }}"
        state: directory
        mode: '0755'
      loop: "{{ groups['hahost'] }}"

    - name: Template HAProxy Config
      delegate_to: localhost
      template:
        src: haproxy.cfg.j2
        dest: "/tmp/k8s_lb_configs/{{ item }}/haproxy.cfg"
        force: true
      loop: "{{ groups['hahost'] }}"

    - name: Template Keepalived Config
      delegate_to: localhost
      template:
        src: keepalived.conf.j2
        dest: "/tmp/k8s_lb_configs/{{ item }}/keepalived.conf"
        force: true
      loop: "{{ groups['hahost'] }}"

    - name: Detect active network interface
      delegate_to: localhost
      become: false
      shell: ssh core@{{ hostvars[item]['provider_ip'] }} "ip -4 -o addr show | grep '192.168.100.' | awk '{print \$2}' | head -n1"
      register: detected_iface
      loop: "{{ groups['hahost'] }}"

    - name: Set interface fact
      set_fact:
        active_iface: "{{ item.stdout }}"
      delegate_to: "{{ item.item }}"
      delegate_facts: true
      loop: "{{ detected_iface.results }}"

    - name: Push and Prepare Node Configuration
      delegate_to: localhost
      become: true  # Use root on the helper to fix permissions and modify files
      vars:
        # Use the specific user's key for the SCP/SSH portions
        ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o LogLevel=ERROR -i /home/core/.ssh/id_rsa"
      loop: "{{ groups['hahost'] }}"
      shell: |
        # 1. Fix local permissions on the helper first
        chown -R core:core /tmp/k8s_lb_configs/{{ item }}
        
        # 2. Update local configs
        sed -i "s|interface .*|interface {{ hostvars[item].active_iface }}|g" /tmp/k8s_lb_configs/{{ item }}/keepalived.conf
        sed -i "s|[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}\.[0-9]\{1,3\}/24|{{ k8s_api_vip }}/24|g" /tmp/k8s_lb_configs/{{ item }}/keepalived.conf
        sed -i "s|bind .*:6443|bind {{ k8s_api_vip }}:6443|g" /tmp/k8s_lb_configs/{{ item }}/haproxy.cfg
        
        # Ensure trailing newline (The "printf" way is more robust)
        sed -i '$a\' /tmp/k8s_lb_configs/{{ item }}/haproxy.cfg

        # 3. SCP configs to the LB node (as core user)
        scp {{ ssh_opts }} /tmp/k8s_lb_configs/{{ item }}/haproxy.cfg core@{{ hostvars[item].ansible_host }}:/tmp/haproxy.cfg
        scp {{ ssh_opts }} /tmp/k8s_lb_configs/{{ item }}/keepalived.conf core@{{ hostvars[item].ansible_host }}:/tmp/keepalived.conf

        # 4. Apply and Start (on the guest nodes)
        ssh {{ ssh_opts }} core@{{ hostvars[item].ansible_host }} "
          sudo sysctl -w net.ipv4.ip_nonlocal_bind=1
          echo 'net.ipv4.ip_nonlocal_bind = 1' | sudo tee /etc/sysctl.d/99-haproxy.conf
          
          # Move and set permissions
          sudo mv /tmp/haproxy.cfg /etc/haproxy/haproxy.cfg
          sudo mv /tmp/keepalived.conf /etc/keepalived/keepalived.conf
          sudo chown root:root /etc/haproxy/haproxy.cfg /etc/keepalived/keepalived.conf
          sudo restorecon -Rv /etc/haproxy /etc/keepalived

          # PRE-FLIGHT & RESTART
          if sudo haproxy -c -f /etc/haproxy/haproxy.cfg; then
            sudo systemctl restart keepalived
            sleep 2
            sudo systemctl restart haproxy
          else
            echo 'HAProxy config still invalid'
            exit 1
          fi
        "

    - name: Start and Verify Services
      delegate_to: localhost
      loop: "{{ groups['hahost'] }}"
      vars:
        ssh_base: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i {{ ssh_key_path }}"
        # We use a literal block here for the multi-line remote command
        remote_verify: |
          sudo systemctl restart keepalived
          sleep 2
          sudo systemctl enable --now haproxy
          systemctl is-active haproxy keepalived
      ansible.builtin.shell: "ssh core@{{ hostvars[item].ansible_host }} '{{ remote_verify }}'"
      register: final_verify
      failed_when: final_verify.rc != 0

- name: Create Isolated Dummy Network
  delegate_to: "{{ VM_HOST_IP }}"
  vars:
    # This forces the connection to use 'secops' from the KVM host's variables
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    if ! virsh net-info black-hole >/dev/null 2>&1; then
      cat <<EOF > /tmp/black-hole.xml
      <network><name>black-hole</name></network>
    EOF
      virsh net-define /tmp/black-hole.xml
      virsh net-autostart black-hole
      virsh net-start black-hole
    fi
