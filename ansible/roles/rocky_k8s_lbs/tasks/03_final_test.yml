# 03_final_test.yml
- name: Power Cycle and Connectivity Verification
  block:
    - name: Hard Power Off VMs
      vars:
        # This forces the connection to use 'secops' from the KVM host's variables
        ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
      become: yes
      shell: "virsh destroy {{ item.split('.')[0] }} || true"
      loop: "{{ groups['hahost'] }}"

    - name: Wait for state settlement
      pause:
        seconds: 5

    - name: Power On VMs
      vars:
        # This forces the connection to use 'secops' from the KVM host's variables
        ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
      become: yes
      shell: "virsh start {{ item.split('.')[0] }}"
      loop: "{{ groups['hahost'] }}"

    - name: Wait for SSH on Production IP
      become: false
      wait_for:
        host: "{{ hostvars[item].ansible_host }}"
        port: 22
        state: started
        delay: 10
        timeout: 120
      loop: "{{ groups['hahost'] }}"

    - name: Final Verification - haproxy`
      delegate_to: localhost
      become: false
      vars:
        ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i {{ ssh_key_path }}"
      shell: |
        ssh core@{{ hostvars[item].ansible_host }} "systemctl is-active haproxy keepalived"
      loop: "{{ groups['hahost'] }}"
      register: service_status
      until: service_status.rc == 0
      retries: 12
      delay: 5
      # We only care if it fails after all retries are exhausted
      failed_when: service_status.rc != 0


    - name: 1.1 - Open Ports and Start Services on HA Hosts
      delegate_to: localhost
      become: false
      vars:
        ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i {{ ssh_key_path }}"
      shell: |
        ssh {{ ssh_opts }} core@{{ hostvars[item].ansible_host }} sudo firewall-cmd --permanent --add-port=6443/tcp 
        ssh {{ ssh_opts }} core@{{ hostvars[item].ansible_host }} sudo firewall-cmd --permanent --add-rich-rule='rule protocol value=\"vrrp\" accept'
        ssh {{ ssh_opts }} core@{{ hostvars[item].ansible_host }} sudo firewall-cmd --reload
        ssh {{ ssh_opts }} core@{{ hostvars[item].ansible_host }} sudo systemctl enable --now haproxy keepalived
      # loop: "{{ groups['hahost'] }}"
      register: lb_bootstrap
      failed_when: lb_bootstrap.rc != 0

    - name: 1.2 - Verify VIP is now active (Ping Test)
      delegate_to: localhost
      shell: "ping -c 3 {{ k8s_api_vip }}"
      register: vip_ping
      until: vip_ping.rc == 0
      retries: 5
      delay: 5