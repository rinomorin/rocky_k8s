- name: "Deployment for {{ lb_node }}"
  delegate_to: "{{ hostvars[lb_node]['ansible_host'] }}"
  vars:
    ansible_user: "{{ hostvars[lb_node]['ansible_user'] | default('core') }}"
  # Use the user from hostvars or fallback to 'core'
  block:
    - name: Allow HAProxy to bind to any IP (Non-local bind)
      sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: '1'
        sysctl_set: yes
        state: present

    - name: Allow HAProxy to bind to K8s API port (SELinux)
      seport:
        ports: 6443
        proto: tcp
        setype: http_port_t
        state: present
      when: ansible_selinux.status == "enabled"

    - name: Push HAProxy and Keepalived configurations
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: '0644'
      loop:
        - { src: 'haproxy.cfg.j2', dest: '/etc/haproxy/haproxy.cfg' }
        - { src: 'keepalived.conf.j2', dest: '/etc/keepalived/keepalived.conf' }

    - name: Validate HAProxy Configuration
      command: haproxy -c -f /etc/haproxy/haproxy.cfg
      register: haproxy_check
      changed_when: false

    - name: Restart Load Balancer Services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - keepalived
        - haproxy
      when: haproxy_check.rc == 0