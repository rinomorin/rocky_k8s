- name: "Deployment for {{ lb_node }}"
  delegate_to: "{{ hostvars[lb_node]['ansible_host'] }}"
  vars:
    ansible_user: "{{ hostvars[lb_node]['ansible_user'] | default('core') }}"
  # Use the user from hostvars or fallback to 'core'
  block:
    - name: System level tweaks for HAProxy
      shell: |
        # 1. Enable non-local binding (allow binding to the VIP)
        sysctl -w net.ipv4.ip_nonlocal_bind=1
        echo "net.ipv4.ip_nonlocal_bind = 1" > /etc/sysctl.d/99-haproxy.conf
        
        # 2. Update SELinux to allow HAProxy on K8s API port
        if [ "$(getenforce)" != "Disabled" ]; then
          semanage port -a -t http_port_t -p tcp 6443 || semanage port -m -t http_port_t -p tcp 6443
          semanage port -a -t http_port_t -p tcp 2049 || semanage port -m -t http_port_t -p tcp 2049
        fi
      become: yes

    - name: Push HAProxy and Keepalived configurations
      delegate_to: "{{ hostvars[lb_node]['ansible_host'] }}"
      become: yes
      template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        newline_sequence: "\r\n"  # Forces a newline at the end
        owner: root
        group: root
        mode: '0644'
      loop:
        - { src: 'haproxy.cfg.j2', dest: '/etc/haproxy/haproxy.cfg' }
        - { src: 'keepalived.conf.j2', dest: '/etc/keepalived/keepalived.conf' }

    - name: Allow HAProxy to bind to custom ports in SELinux
      community.general.seport:
        ports: 5443,30443,30080,30180,2049
        proto: tcp
        setype: http_port_t
        state: present

    - name: Allow non-local IP binding for VIPs
      ansible.posix.sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes
    - name: Validate HAProxy Configuration
      command: haproxy -c -f /etc/haproxy/haproxy.cfg
      register: haproxy_check
      changed_when: false

    - name: Restart Load Balancer Services
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
      loop:
        - keepalived
        - haproxy
      when: haproxy_check.rc == 0

    - name: Set HAProxy and Keepalived to SELinux permissive mode
      become: yes
      shell: |
        # Check if they are already permissive to avoid errors
        if ! semodule -l | grep -q "permissive_haproxy_t"; then
          semanage permissive -a haproxy_t
        fi
        if ! semodule -l | grep -q "permissive_keepalived_t"; then
          semanage permissive -a keepalived_t
        fi

    - name: Allow HAProxy to bind to custom ports in SELinux
      community.general.seport:
        ports: 5443,30443,30080,30180,2049
        proto: tcp
        setype: http_port_t
        state: present

    - name: Allow non-local IP binding for VIPs
      ansible.posix.sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: '1'
        sysctl_set: yes
        state: present
        reload: yes

    - name: Force disk sync inside VMs
      become: yes
      command: sync
      loop: "{{ groups['hahost'] }}"

