---
- name: Clone Load Balancer nodes from Golden Image
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  command: >
    virt-clone --original {{ golden_image_name }}
    --name {{ item.split('.')[0] }} 
    --file /var/lib/libvirt/images/{{ item.split('.')[0] }}.qcow2
  loop: "{{ groups['hahost'] }}"
  register: lb_clones
  failed_when: 
    - lb_clones.rc != 0 
    - "'already exists' not in lb_clones.stderr"

- name: Power on lb image
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: "virsh start {{ item.split('.')[0] }}"
  register: vm_start
  failed_when: 
    - vm_start.rc != 0 
    - "'already active' not in vm_start.stderr"
  changed_when: "vm_start.rc == 0"
  loop: "{{ groups['hahost'] }}"

- name: 1.1 - Discover Maintenance IP from br-nat
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    M_MAC=$(virsh domiflist {{ item.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 2; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: maintenance_ip_raw
  loop: "{{ groups['hahost'] }}"

- name: 1.2 - Verify Maintenance SSH (sshok)
  become: false
  vars:
    m_ip: "{{ item.stdout }}"
    ssh_opt: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
  shell: |
    ssh {{ ssh_opt }} -i ~/.ssh/id_rsa core@{{ m_ip }} "echo sshok"
  register: ssh_test
  until: ssh_test.rc == 0
  retries: 15
  delay: 5
  loop: "{{ maintenance_ip_raw.results }}"

- name: 1.3 - Store Maintenance IPs in Map
  set_fact:
    maintenance_map: "{{ maintenance_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ maintenance_ip_raw.results }}"

- name: 1.1.2 - Discover Provision MAC from br-cluster
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    virsh domiflist {{ item.split('.')[0] }} | grep 'br-cluster' | awk '{print $5}'
  register: cluster_mac_discovery
  loop: "{{ groups['hahost'] }}"

- name: 1.1.3 - Build Cluster MAC Map
  set_fact:
    c_mac_map: "{{ c_mac_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ cluster_mac_discovery.results }}"

- name: 2.1 - Discover Provider MAC from default network
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    virsh domiflist {{ item.split('.')[0] }} | grep 'default' | awk '{print $5}'
  register: provider_mac_discovery
  loop: "{{ groups['hahost'] }}"

- name: 2.1.1 - Build Provider MAC Map
  set_fact:
    p_mac_map: "{{ p_mac_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ provider_mac_discovery.results }}"

- name: 2.2 - Configure Provider IP via Maintenance Tunnel
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    p_mac: "{{ p_mac_map[item] }}"
    provider_ip: "{{ hostvars[item].ansible_host }}"
    # Fetches the .1 gateway from the 'default' network CIDR on kvmdc01
    provider_gw: "{{ hostvars['kvmdc01'].libvirt_networks | selectattr('name', 'equalto', 'default') | map(attribute='cidr') | first | ansible.utils.ipaddr('net') | ansible.utils.ipaddr('1') | split('/') | first }}"
    dns_servers: "{{ groups['dns'] | map('extract', hostvars, 'ansible_host') | join(' ') }}"
    ssh_base: >-
      ssh -o StrictHostKeyChecking=no 
      -o UserKnownHostsFile=/dev/null 
      -o BatchMode=yes 
      -i ~/.ssh/id_rsa 
      core@{{ m_ip }}
  shell: |
    DEV=$({{ ssh_base }} "nmcli -t -f GENERAL.DEVICE,GENERAL.HWADDR device show" | grep -B 1 -i "{{ p_mac }}" | head -n 1 | cut -d: -f2)
    
    {{ ssh_base }} "sudo nmcli con delete provider || true"
    
    {{ ssh_base }} "sudo nmcli con add type ethernet con-name provider ifname $DEV \
      ipv4.method manual ipv4.addresses {{ provider_ip }}/24 \
      ipv4.gateway {{ provider_gw }} \
      ipv4.dns '{{ dns_servers }}' \
      ipv4.route-metric 300 \
      ipv4.never-default yes \
      connection.autoconnect yes"
    
    {{ ssh_base }} "sudo nmcli con up provider"
  loop: "{{ groups['hahost'] }}"

- name: 2.4 - Configure Cluster IP (10.x) via Maintenance Tunnel
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    c_mac: "{{ c_mac_map[item] }}"
    node_ip: "{{ hostvars[item].node_ip }}"
    ssh_base: >-
      ssh -o StrictHostKeyChecking=no 
      -o UserKnownHostsFile=/dev/null 
      -o BatchMode=yes 
      -i ~/.ssh/id_rsa 
      core@{{ m_ip }}
  shell: |
    DEV=$({{ ssh_base }} "nmcli -t -f GENERAL.DEVICE,GENERAL.HWADDR device show" | grep -B 1 -i "{{ c_mac }}" | head -n 1 | cut -d: -f2)

    {{ ssh_base }} "sudo nmcli con delete cluster || true"

    {{ ssh_base }} "sudo nmcli con add type ethernet con-name cluster ifname $DEV \
      ipv4.method manual ipv4.addresses {{ node_ip }}/24 \
      ipv4.route-metric 200 \
      ipv4.never-default yes \
      connection.autoconnect yes"

    {{ ssh_base }} "sudo nmcli con up cluster"
  loop: "{{ groups['hahost'] }}"

- name: Verify SSH reachability on Static IPs
  wait_for:
    host: "{{ hostvars[item].ansible_host }}"
    port: 22
    state: started
    timeout: 60
  loop: "{{ groups['hahost'] }}"