---
- name: "DNS - Connectivity Based Setup"
  become: yes
  block:
    - name: "Check connectivity to IPA and Helper"
      ansible.builtin.ping:
      register: ping_results
      ignore_errors: yes
      loop:
        - "{{ hostvars[groups['ipa'][0]]['provision_ip'] }}"
        - "{{ hostvars[groups['helpers'][0]]['provision_ip'] }}"

    - name: "Initialize Nameserver List"
      ansible.builtin.set_fact:
        ns_list: []

    - name: "Add Helper Segment Gateway if Helper reachable"
      ansible.builtin.set_fact:
        ns_list: "{{ ns_list + [hostvars[groups['helpers'][0]]['provision_ip'].split('.')[:3] | join('.') + '.1'] }}"
      when: ping_results.results[1].rc == 0

    - name: "Add IPA Segment Gateways if IPA reachable"
      ansible.builtin.set_fact:
        ns_list: "{{ ns_list + [
          hostvars[groups['ipa'][0]]['provision_ip'].split('.')[:3] | join('.') + '.1',
          hostvars[groups['ipa'][1]]['provision_ip'].split('.')[:3] | join('.') + '.1'
        ] }}"
      when: ping_results.results[0].rc == 0

    - name: "Final Fallback to Google DNS if list is empty"
      ansible.builtin.set_fact:
        ns_list: ["8.8.8.8"]
      when: ns_list | length == 0

    - name: "Apply /etc/resolv.conf"
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          search {{ ipa_domain }}
          {% for ns in ns_list | unique %}
          nameserver {{ ns }}
          {% endfor %}
        owner: root
        group: root
        mode: '0644'

- name: Clone Load Balancer nodes from Golden Image
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  command: >
    virt-clone --original {{ golden_image_name }}
    --name {{ item.split('.')[0] }} 
    --file /var/lib/libvirt/images/{{ item.split('.')[0] }}.qcow2
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"
  register: nodes_clones
  failed_when: 
    - nodes_clones.rc != 0 
    - "'already exists' not in nodes_clones.stderr"

- name: Power on nodes images
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: "virsh start {{ item.split('.')[0] }}"
  register: vm_start
  failed_when: 
    - vm_start.rc != 0 
    - "'already active' not in vm_start.stderr"
  changed_when: "vm_start.rc == 0"
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"

- name: 1.1 - Discover Maintenance IP from br-nat
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    M_MAC=$(virsh domiflist {{ item.split('.')[0] }} | grep 'br-nat' | awk '{print $5}')
    while ! virsh net-dhcp-leases br-nat | grep -q "$M_MAC"; do sleep 2; done
    virsh net-dhcp-leases br-nat | grep "$M_MAC" | awk '{print $5}' | cut -d/ -f1
  register: maintenance_ip_raw
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"

- name: 1.2 - Verify Maintenance SSH (sshok)
  become: false
  vars:
    m_ip: "{{ item.stdout }}"
    ssh_opt: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes"
  shell: |
    ssh {{ ssh_opt }} -i ~/.ssh/id_rsa core@{{ m_ip }} "echo sshok"
  register: ssh_test
  until: ssh_test.rc == 0
  retries: 15
  delay: 5
  loop: "{{ maintenance_ip_raw.results }}"

- name: 1.3 - Store Maintenance IPs in Map
  set_fact:
    maintenance_map: "{{ maintenance_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ maintenance_ip_raw.results }}"

- name: 1.1.2 - Discover Provision MAC from br-cluster
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    virsh domiflist {{ item.split('.')[0] }} | grep 'br-cluster' | awk '{print $5}'
  register: cluster_mac_discovery
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"

- name: 1.1.3 - Build Cluster MAC Map
  set_fact:
    c_mac_map: "{{ c_mac_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ cluster_mac_discovery.results }}"

- name: 2.1 - Discover Provider MAC from default network
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    virsh domiflist {{ item.split('.')[0] }} | grep 'default' | awk '{print $5}'
  register: provider_mac_discovery
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] }}"

- name: 2.1.1 - Build Provider MAC Map
  set_fact:
    p_mac_map: "{{ p_mac_map | default({}) | combine({ item.item: item.stdout }) }}"
  loop: "{{ provider_mac_discovery.results }}"

- name: 2.2 - Configure Provider IP via Maintenance Tunnel
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    p_mac: "{{ p_mac_map[item] }}"
    p_ip: "{{ hostvars[item].ansible_host }}"
    # Generic placeholder for gateway
    p_gw: "{{ hostvars[item].ansible_host.split('.')[0] }}.1" 
    # SSH parameters defined simply
    ssh_cmd: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa core@{{ m_ip }}"
  shell: |
    # 1. Get Device Name
    DEV=$({{ ssh_cmd }} "nmcli -t -f GENERAL.DEVICE,GENERAL.HWADDR device show" | grep -B 1 -i "{{ p_mac }}" | head -n 1 | cut -d: -f2)
    
    # 2. Force Link Up and Clean old connections
    {{ ssh_cmd }} "sudo ip link set $DEV up"
    {{ ssh_cmd }} "sudo nmcli con delete provider || true"
    {{ ssh_cmd }} "sudo nmcli con delete $DEV || true"

    # 3. Add Connection
    {{ ssh_cmd }} "sudo nmcli con add type ethernet con-name $DEV ifname $DEV ipv4.method manual ipv4.addresses {{ p_ip }}/24 ipv4.gateway {{ p_gw }} ipv4.route-metric 300 ipv4.never-default yes connection.autoconnect yes"
    
    # 4. Final Activation
    {{ ssh_cmd }} "sudo nmcli con up $DEV"
  loop: "{{ groups['control_nodes'] | default([]) }}"

- name: 2.4 - Configure Cluster IP (10.x) via Maintenance Tunnel
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    c_mac: "{{ c_mac_map[item] }}"
    node_ip: "{{ hostvars[item].provision_ip }}"
    # standardized the ssh command to avoid nested quote errors
    ssh_cmd: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa core@{{ m_ip }}"
  shell: |
    # 1. Identify the device
    DEV=$({{ ssh_cmd }} "nmcli -t -f GENERAL.DEVICE,GENERAL.HWADDR device show" | grep -B 1 -i "{{ c_mac }}" | head -n 1 | cut -d: -f2)

    # 2. Force hardware state and clean old profiles
    {{ ssh_cmd }} "sudo ip link set $DEV up"
    {{ ssh_cmd }} "sudo nmcli con delete cluster || true"
    {{ ssh_cmd }} "sudo nmcli con delete $DEV || true"

    # 3. Add the connection (Single line to prevent YAML splitting errors)
    {{ ssh_cmd }} "sudo nmcli con add type ethernet con-name $DEV ifname $DEV ipv4.method manual ipv4.addresses {{ node_ip }}/24 ipv4.route-metric 200 ipv4.never-default yes connection.autoconnect yes"

    # 4. Kick the connection
    {{ ssh_cmd }} "sudo nmcli con up $DEV"
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

- name: 3.1 - Force KVM Link State to UP (Host Side)
  vars:
    ansible_user: "{{ hostvars[kvm_host]['ansible_user'] }}"
  become: yes
  shell: |
    # Get all interface MACs for this VM and force them to 'up'
    VM_NAME="{{ item.split('.')[0] }}"
    for mac in $(virsh domiflist $VM_NAME | grep -v 'Interface' | grep -v '\---' | awk '{print $5}'); do
      sudo virsh domif-setlink $VM_NAME $mac up
    done
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

- name: 3.2 - Force Guest Link State and Autoconnect (Guest Side)
  become: false
  vars:
    # Use a simpler SSH base without the extra vars inside the shell block
    m_ip: "{{ maintenance_map[item] }}"
    ssh_target: "core@{{ m_ip }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa"
  shell: |
    # We send the entire logic block as a single remote command
    ssh {{ ssh_opts }} {{ ssh_target }} '
      for dev in enp2s0 enp3s0; do
        sudo ip link set $dev up
        sudo nmcli device set $dev autoconnect yes
        sudo nmcli device set $dev managed yes
      done
      sudo nmcli connection up cluster || true
      sudo nmcli connection up provider || true
    '
  loop: "{{ groups['control_nodes']| default([]) }}"

- name: 3.2 - Force Guest Link State and Autoconnect (Guest Side)
  become: false
  vars:
    # Use a simpler SSH base without the extra vars inside the shell block
    m_ip: "{{ maintenance_map[item] }}"
    ssh_target: "core@{{ m_ip }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa"
  shell: |
    # We send the entire logic block as a single remote command
    ssh {{ ssh_opts }} {{ ssh_target }} '
      for dev in enp2s0; do
        sudo ip link set $dev up
        sudo nmcli device set $dev autoconnect yes
        sudo nmcli device set $dev managed yes
      done
      sudo nmcli connection up cluster || true
    '
  loop: "{{ groups['worker_nodes'] | default([]) }}"

- name: 4.1a - Get local public key as a fact
  delegate_to: localhost
  become: false
  set_fact:
    my_public_key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

- name: 4.1b - Authorize local key on guests
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa"
  shell: |
    ssh {{ ssh_opts }} core@{{ m_ip }} "mkdir -p ~/.ssh && chmod 700 ~/.ssh && \
    if ! grep -q '{{ my_public_key }}' ~/.ssh/authorized_keys; then \
      echo '{{ my_public_key }}' >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys; \
    fi"
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

- name: 5.2 - Network Routing Swap and Maintenance Isolation
  become: false
  vars:
    m_ip: "{{ maintenance_map[item] }}"
    p_gw: "192.168.100.1"
    ssh_cmd: "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -i ~/.ssh/id_rsa core@{{ m_ip }}"
  shell: |
    # 1. Promote Provider (enp3s0) to be the Default Route
    {{ ssh_cmd }} "sudo nmcli connection modify enp3s0 ipv4.gateway {{ p_gw }} ipv4.route-metric 50 ipv4.never-default no"

    # 2. Demote Maintenance (enp1s0) and isolate it
    # We strip its current gateway and set a massive metric
    {{ ssh_cmd }} "sudo nmcli connection modify enp1s0 ipv4.gateway '' ipv4.route-metric 1000 ipv4.never-default yes"

    # 3. Apply changes - we do provider first so the new path is ready
    {{ ssh_cmd }} "sudo nmcli connection up enp3s0 && sudo nmcli connection up enp1s0"
  loop: "{{ groups['control_nodes'] | default([]) }}"

- name: 6.0 - Force helper to learn new node identities
  delegate_to: localhost
  become: false
  shell: |
    # 1. Remove the old entry if it exists
    ssh-keygen -R {{ hostvars[item]['provision_ip'] }} || true
    ssh-keygen -R {{ item.split('.')[0] }} || true
    
    # 2. Connect once and force-save the NEW key to known_hosts
    ssh -o StrictHostKeyChecking=accept-new \
        -i ~/.ssh/id_rsa core@{{ hostvars[item]['provision_ip'] }} "echo 'Key Learned'"
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

- name: 6.1 - Verify permanent connection (no flags needed now)
  delegate_to: localhost
  become: false
  shell: "ssh -i ~/.ssh/id_rsa core@{{ hostvars[item]['provision_ip'] }} 'ip route'"
  register: node_verify
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

- name: local connection
  delegate_to: localhost
  become: false
  shell: "ssh {{ hostvars[item]['provision_ip']}} ip route"
  register: node_connet
  loop: "{{ groups['control_nodes'] + groups['worker_nodes'] | default([]) }}"

