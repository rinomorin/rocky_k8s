- name: Verify SSH reachability on Static IPs
  become: false
  wait_for:
    host: "{{ hostvars[item]['provision_ip'] }}"
    port: 22
    state: started
    timeout: 60
  loop: "{{ groups['cluster_nodes'] | default([]) }}"

- name: Force disk sync inside VMs
  become: yes
  command: sync
  loop: "{{ groups['cluster_nodes'] | default([]) }}"

