---
- name: Start image VMs {{ golden_image_name }}
  shell: |
    virsh list --all | grep -i "^.*{{ golden_image_name }}.*" | awk '{print $2}' | xargs -r -I {} virsh start {}
  register: start_output
  changed_when: start_output.stdout != ""

# 1. Just shut it down first
- name: "3.1.3 - Shutdown Golden VM"
  become: true
  virt:
    name: "{{ golden_image_name }}"
    state: destroyed # Force shutdown

# 2. Let virt-sysprep do the heavy lifting on the cold disk
- name: "3.1.4 - Sysprep and Personalize the Golden Image"
  become: true
  command: >
    virt-sysprep -d {{ golden_image_name }}
    --operations machine-id,net-hostname,net-hwaddr,ssh-hostkeys,bash-history,logfiles,tmp-files
    --delete '/etc/NetworkManager/system-connections/*'
    --delete '/etc/udev/rules.d/70-persistent-net.rules'

- name: Sysprep the golden (On Hypervisor)
  become: true
  shell: |
    # We run this on the KVM host while the VM is OFF
    virt-sysprep -d {{ golden_image_name }} \
      --operations machine-id,net-hostname,net-hwaddr,ssh-hostkeys,customize
