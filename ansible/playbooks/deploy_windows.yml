---
# --- PRE-FLIGHT CHECK: LICENSE ENFORCEMENT ---
- name: "Pre-Flight Check: Validate Windows OEM License Key"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "Assert that 'oem_key_win' is provided"
      ansible.builtin.assert:
        that:
          - oem_key_win is defined
          - oem_key_win | length > 0
        fail_msg: |
          CRITICAL ERROR: 'oem_key_win' is not defined!
          We must pass the license key via extra-vars to proceed.
          Example: ansible-playbook site.yml -e "oem_key_win=XXXXX-XXXXX-XXXXX-XXXXX-XXXXX"
        success_msg: "License key detected. Proceeding with Windows deployment."    

